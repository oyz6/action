name: TeoHeberg 续期

on:
  workflow_dispatch:
  schedule:
    - cron: '33 0 * * *'

jobs:
  run:
    name: 执行续期
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          set -euo pipefail

          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb p7zip-full \
            mesa-utils libgl1-mesa-glx libgl1-mesa-dri

          pip install --quiet playwright requests
          python -m playwright install --with-deps chromium

          BUSTER_DIR="scripts/TeoHeberg/extensions/buster/unpacked"
          TURNSTILE_DIR="scripts/TeoHeberg/extensions/turnstile-bypasser/unpacked"

          mkdir -p "$BUSTER_DIR" "$TURNSTILE_DIR"

          curl -fsSL \
            "https://github.com/oyz6/action/releases/download/Verification/buster.zip" \
            -o buster.zip
          7z x -y buster.zip -o"$BUSTER_DIR" >/dev/null

          curl -fsSL \
            "https://github.com/oyz6/action/releases/download/Verification/turnstile.crx" \
            -o turnstile.crx
          7z x -y turnstile.crx -o"$TURNSTILE_DIR" >/dev/null

          [ -f "$BUSTER_DIR/manifest.json" ]
          [ -f "$TURNSTILE_DIR/manifest.json" ]

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3

          for i in {1..30}; do
            status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            [[ "$status" =~ ^(on|plus)$ ]] && echo "WARP 已连接" && break
            echo "WARP 连接中... ($i/30)"
            sleep 2
          done
          echo -n "出口 IP: " && curl -s https://api.ipify.org && echo

      - name: 执行续期
        env:
          TEOHEBERG: ${{ secrets.TEOHEBERG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python scripts/TeoHeberg/main.py

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 运行截图
          path: screenshots/*
          retention-days: 1

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
