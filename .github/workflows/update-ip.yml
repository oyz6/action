name: 更新全球 IP 数据库

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    name: 更新全球 IP 数据库
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 临时生成 package.json 并安装依赖
        run: |
          cat > package.json << 'EOF'
          {
            "name": "ip-db-updater",
            "private": true,
            "dependencies": {
              "maxmind": "^4.3.23"
            }
          }
          EOF
          npm install

      - name: 下载 GeoLite2 国家数据库
        run: |
          mkdir -p data
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/P3TERX/GeoLite.mmdb/releases/latest \
            | grep -o 'https://.*GeoLite2-Country.mmdb"' \
            | tr -d '"')
          echo "下载地址: $DOWNLOAD_URL"
          curl -s -L "$DOWNLOAD_URL" -o data/GeoLite2-Country.mmdb

      - name: 执行更新脚本
        run: node scripts/update-db.js

      - name: 检查生成文件
        run: ls -la data/ip-database.json

      - name: 上传到 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view ip-database > /dev/null 2>&1; then
            echo "Release 不存在，正在创建..."
            gh release create ip-database \
              --title "IP Database" \
              --notes "每日自动更新的全球 IP 数据库" \
              --latest
          else
            echo "Release 已存在，将覆盖同名资产"
          fi
          gh release upload ip-database data/ip-database.json --clobber

      - name: 失败时通知
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="❌ <b>IP 数据库更新失败</b>%0A%0A仓库: ${{ github.repository }}%0A查看: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
