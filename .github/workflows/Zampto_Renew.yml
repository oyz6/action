name: Zampto 续期

on:
  schedule:
    - cron: '55 3 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    concurrency:
      group: Zampto_Renew
      cancel-in-progress: false

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 环境准备
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xvfb unzip curl netstat-nat > /dev/null
          pip install -q seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0

      - name: 启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          # 如果没有代理节点，跳过代理设置
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理节点，将使用直连"
            echo "PROXY_SOCKS5=" >> $GITHUB_ENV
            exit 0
          fi

          echo "[INFO] 开始设置代理..."
          
          # 下载 Xray
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          # 生成配置文件
          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote

          def mask(s): return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url: 
            print("[ERROR] 代理节点为空")
            sys.exit(1)

          # 处理外部 SOCKS5 代理
          if url.startswith("socks5://") or url.startswith("socks://"):
            with open("use_external_socks.txt", "w") as f:
              f.write(url.split("#")[0])
            print(f"[INFO] 使用外部SOCKS5代理: {mask(url)}")
            sys.exit(0)

          # 支持的协议
          protocols = {"vless://": "vless", "vmess://": "vmess", "trojan://": "trojan", "ss://": "ss"}
          protocol = None
          for prefix, proto in protocols.items():
            if url.startswith(prefix):
              protocol = proto
              content = url[len(prefix):]
              break
          
          if not protocol:
            print(f"[ERROR] 不支持的协议: {url.split('://')[0] if '://' in url else 'unknown'}")
            sys.exit(1)

          # 移除锚点
          content = content.rsplit("#", 1)[0] if "#" in content else content

          # 基础配置
          config = {
            "log": {"loglevel": "info"},
            "inbounds": [
              {"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
              {"port": 10809, "listen": "127.0.0.1", "protocol": "http"}
            ],
            "outbounds": []
          }

          try:
            if protocol == "vless":
              uuid, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              
              print(f"[INFO] VLESS -> {mask(address)}:{port}")

              outbound = {
                "protocol": "vless",
                "settings": {"vnext": [{"address": address, "port": int(port),
                  "users": [{"id": uuid, "encryption": "none"}]}]},
                "streamSettings": {"network": network, "security": security}
              }
              
              if flow: 
                outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              
              if security == "reality":
                outbound["streamSettings"]["realitySettings"] = {
                  "serverName": sni, "fingerprint": fp, "publicKey": pbk
                }
              elif security == "tls":
                outbound["streamSettings"]["tlsSettings"] = {
                  "serverName": sni, "fingerprint": fp
                }
              
              if network == "ws":
                outbound["streamSettings"]["wsSettings"] = {
                  "path": path, "headers": {"Host": host}
                }
              elif network == "grpc":
                outbound["streamSettings"]["grpcSettings"] = {
                  "serviceName": params.get("serviceName", [""])[0]
                }
              
              config["outbounds"].append(outbound)

            elif protocol == "vmess":
              # VMess 解析
              padding = 4 - len(content) % 4
              if padding != 4: content += "=" * padding
              vm = json.loads(base64.b64decode(content).decode())
              
              address, port = vm.get("add", ""), int(vm.get("port", 443))
              network, tls = vm.get("net", "tcp"), vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              
              print(f"[INFO] VMess -> {mask(address)}:{port}")
              
              outbound = {
                "protocol": "vmess",
                "settings": {"vnext": [{"address": address, "port": port,
                  "users": [{"id": vm.get("id", ""), "alterId": int(vm.get("aid", 0)), "security": "auto"}]}]},
                "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              
              if tls == "tls":
                outbound["streamSettings"]["tlsSettings"] = {
                  "serverName": sni, "fingerprint": vm.get("fp", "chrome")
                }
              
              if network == "ws":
                outbound["streamSettings"]["wsSettings"] = {
                  "path": vm.get("path", "/"), "headers": {"Host": vm.get("host", address)}
                }
              
              config["outbounds"].append(outbound)

            elif protocol == "trojan":
              # Trojan 解析
              password, rest = content.split("@", 1)
              host_port, params_str = rest.split("?", 1) if "?" in rest else (rest, "")
              address, port = host_port.rsplit(":", 1) if ":" in host_port else (host_port, "443")
              params = parse_qs(params_str)
              
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              
              print(f"[INFO] Trojan -> {mask(address)}:{port}")
              
              outbound = {
                "protocol": "trojan",
                "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                "streamSettings": {"network": network, "security": "tls",
                  "tlsSettings": {"serverName": sni, "fingerprint": params.get("fp", ["chrome"])[0]}}
              }
              
              if network == "ws":
                outbound["streamSettings"]["wsSettings"] = {
                  "path": unquote(params.get("path", ["/"])[0]),
                  "headers": {"Host": params.get("host", [sni])[0]}
                }
              
              config["outbounds"].append(outbound)

            elif protocol == "ss":
              # Shadowsocks 解析
              try:
                if "@" in content:
                  encoded, server_part = content.split("@", 1)
                  decoded = base64.b64decode(encoded + "==").decode()
                  method, password = decoded.split(":", 1)
                  address, port = server_part.split(":", 1)
                else:
                  decoded = base64.b64decode(content + "==").decode()
                  user_part, server_part = decoded.split("@", 1)
                  method, password = user_part.split(":", 1)
                  address, port = server_part.split(":", 1)
              except Exception as e:
                print(f"[ERROR] SS 解析失败: {e}")
                sys.exit(1)
              
              print(f"[INFO] SS -> {mask(address)}:{port}")
              
              config["outbounds"].append({
                "protocol": "shadowsocks",
                "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}
              })

            # 写入配置文件
            with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
            
            print("[INFO] ✅ 配置已生成")

          except Exception as e:
            print(f"[ERROR] 配置生成失败: {e}")
            sys.exit(1)
          PYEOF

          # 检查是否使用外部 SOCKS5
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_PROXY=$(cat use_external_socks.txt)
            echo "PROXY_SOCKS5=$EXTERNAL_PROXY" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部代理: $EXTERNAL_PROXY"
            exit 0
          fi

          # 启动 Xray
          echo "[INFO] 启动 Xray 服务..."
          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          XRAY_PID=$!
          
          # 等待 Xray 启动
          sleep 8
          
          # 检查 Xray 进程状态
          if ! kill -0 $XRAY_PID 2>/dev/null; then
            echo "[ERROR] Xray 进程启动失败"
            echo "=== Xray 日志 ==="
            cat xray.log
            exit 1
          fi
          
          # 检查端口监听状态
          echo "[INFO] 检查端口状态..."
          if ! netstat -tlnp 2>/dev/null | grep -q ":10808"; then
            echo "[ERROR] SOCKS5 端口 10808 未监听"
            echo "=== 端口状态 ==="
            netstat -tlnp 2>/dev/null | grep -E ":(10808|10809)" || echo "未找到相关端口"
            echo "=== Xray 日志 ==="
            cat xray.log
            exit 1
          fi
          
          # 测试代理连接
          echo "[INFO] 测试代理连接..."
          SUCCESS=false
          
          for i in {1..5}; do
            echo "[INFO] 第 $i 次尝试..."
            
            # 测试多个目标
            for target in "https://httpbin.org/ip" "https://api.ipify.org" "https://icanhazip.com"; do
              if timeout 20 curl -x socks5://127.0.0.1:10808 -s --connect-timeout 10 --max-time 15 "$target" > /dev/null 2>&1; then
                echo "[INFO] ✅ 代理连接成功 (目标: $target)"
                SUCCESS=true
                break 2
              fi
            done
            
            if [ $i -lt 5 ]; then
              echo "[WARN] 第 $i 次尝试失败，等待重试..."
              sleep 5
            fi
          done
          
          if [ "$SUCCESS" = true ]; then
            echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
            echo "[INFO] ✅ 代理设置完成"
          else
            echo "[ERROR] ❌ 代理连接测试失败"
            echo "=== 最终诊断 ==="
            echo "Xray 进程状态: $(kill -0 $XRAY_PID 2>/dev/null && echo '运行中' || echo '已停止')"
            echo "端口监听状态:"
            netstat -tlnp 2>/dev/null | grep -E ":(10808|10809)" || echo "无相关端口监听"
            echo "=== Xray 日志 ==="
            cat xray.log
            
            # 设置为直连模式而不是失败
            echo "[WARN] 将使用直连模式"
            echo "PROXY_SOCKS5=" >> $GITHUB_ENV
          fi

      - name: 执行续期
        env:
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
        run: |
          if [ -n "$PROXY_SOCKS5" ]; then
            echo "[INFO] 使用代理: $PROXY_SOCKS5"
          else
            echo "[INFO] 使用直连模式"
          fi
          
          python scripts/Zampto/Zampto_Renew.py

      - name: 清理进程
        if: always()
        run: |
          # 清理 Xray 进程
          pkill -f "xray" || true
          # 清理临时文件
          rm -f xray_config.json xray.log use_external_socks.txt || true

#      - name: 上传截图
#        uses: actions/upload-artifact@v4
#        if: always()
#        with:
#          name: zampto-${{ github.run_number }}
#          path: output/screenshots/
#          retention-days: 3

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
