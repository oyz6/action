name: 编译 embedded 版本 v1.so (musl static + C launcher)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
    env:
      GO_VERSION: "1.21"      # Nezha Agent 要求的 Go 版本（以官方 go.mod 为准）
      AGENT_VERSION: "v0.16.0"  # 请根据需要修改版本

    steps:
      - name: Checkout Nezha Agent source
        uses: actions/checkout@v4
        with:
          repository: nezhahq/agent
          ref: ${{ env.AGENT_VERSION }}
          path: agent-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev musl binutils

      - name: Build Nezha Agent static binary (musl)
        run: |
          cd agent-src
          CGO_ENABLED=1 CC=musl-gcc GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags '-s -w -extldflags "-static"' -o ../nezha-agent ./cmd/agent
          cd ..
          file nezha-agent
          ldd nezha-agent 2>&1 | grep -q "not a dynamic executable" || echo "Warning: not static"

      - name: Create C launcher and embed binary
        run: |
          # 将二进制转为目标文件
          objcopy -I binary -O elf64-x86-64 -B i386:x86-64 nezha-agent nezha-agent.o

          # 编写启动器（注意参数格式：nezha-agent 需要 --config 或命令行参数）
          cat > launcher.c << 'EOF'
          #define _GNU_SOURCE
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <sys/mman.h>
          #include <sys/syscall.h>
          #include <signal.h>
          #include <errno.h>
          #include <fcntl.h>
          #include <sys/stat.h>

          extern const unsigned char _binary_nezha_agent_start[];
          extern const unsigned char _binary_nezha_agent_end[];

          static pid_t child_pid = 0;

          int StartNezhaAgent(const char *config_json) {
              if (child_pid > 0) {
                  kill(child_pid, SIGTERM);
                  child_pid = 0;
              }

              int fd = syscall(SYS_memfd_create, "nezha", 0);
              if (fd == -1) {
                  fd = shm_open("/nezha_exec", O_CREAT | O_RDWR, 0700);
                  if (fd == -1) {
                      perror("memfd_create/shm_open");
                      return -1;
                  }
                  shm_unlink("/nezha_exec");
              }

              size_t size = _binary_nezha_agent_end - _binary_nezha_agent_start;
              if (write(fd, _binary_nezha_agent_start, size) != size) {
                  perror("write");
                  close(fd);
                  return -1;
              }

              // Nezha Agent 通常需要命令行参数：-c <config_path>
              // config_json 可能是一个 JSON 字符串（根据 app.py 中的 payload 格式）
              // 这里假设 payload 是 '{"config": "/path/to/config.yaml"}' 格式
              // 我们需要先解析出 config 路径，或者直接传递参数
              // 为了简单，我们假设 config_json 本身就是配置文件路径（如果不是，可能需要解析）
              // 但 app.py 中的 nezha_payload() 返回的是 '{"config": "/.../config.yaml"}'
              // 所以这里需要提取路径。我们可以简单地将整个字符串作为参数，但 nezha-agent 不接受 --config-json
              // 下面使用一个 helper：将 config_json 写入临时文件，然后 -c 参数指向该文件
              char tmp_config[] = "/tmp/nezha-config-XXXXXX";
              int cfg_fd = mkstemp(tmp_config);
              if (cfg_fd == -1) {
                  perror("mkstemp");
                  close(fd);
                  return -1;
              }
              write(cfg_fd, config_json, strlen(config_json));
              close(cfg_fd);

              pid_t pid = fork();
              if (pid == -1) {
                  perror("fork");
                  close(fd);
                  return -1;
              }
              if (pid == 0) {
                  char fd_path[64];
                  snprintf(fd_path, sizeof(fd_path), "/proc/self/fd/%d", fd);
                  close(0); close(1); close(2);
                  execl(fd_path, "nezha-agent", "service", "-c", tmp_config, NULL);
                  perror("execl");
                  _exit(1);
              }

              close(fd);
              child_pid = pid;
              return 0;
          }

          int StopNezhaAgent() {
              if (child_pid > 0) {
                  kill(child_pid, SIGTERM);
                  child_pid = 0;
              }
              return 0;
          }
          EOF

          # 编译共享库
          musl-gcc -shared -fPIC -o v1.so launcher.c nezha-agent.o -lrt
          file v1.so
          nm -D v1.so | grep -E "StartNezhaAgent|StopNezhaAgent"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v1-musl-${{ matrix.arch }}
          path: v1.so
