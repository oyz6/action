# .github/workflows/XServer.yml
name: XServer 游戏机续期

on:
  schedule:
    - cron: '40 9 * * *'  # 日本时间 18:40
  workflow_dispatch:

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
      - name: 检查是否需要续期
        id: check
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          echo "[INFO] 通过 GitHub API 读取 logs.txt..."

          HTTP_CODE=$(curl -s -o /tmp/logs_response.json -w "%{http_code}" \
            -H "Authorization: token $REPO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/oyz6/scripts/contents/scripts/XServer/logs.txt")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "[WARN] 无法读取 logs.txt (HTTP $HTTP_CODE)，视为全部需要续期"
            echo "need_renew=true" >> $GITHUB_OUTPUT
            echo "accounts_to_renew=ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 解码 base64 内容
          cat /tmp/logs_response.json | python3 -c "
          import sys, json, base64
          data = json.load(sys.stdin)
          content = base64.b64decode(data['content']).decode('utf-8')
          print(content)
          " > /tmp/logs.txt

          echo "[INFO] logs.txt 读取成功 ($(wc -l < /tmp/logs.txt) 行)"

          # 获取文件 SHA（后续更新用）
          LOG_SHA=$(cat /tmp/logs_response.json | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "log_sha=$LOG_SHA" >> $GITHUB_OUTPUT

          python3 << 'PYEOF'
          import os, sys
          from datetime import datetime, timedelta, timezone

          jst = timezone(timedelta(hours=9))
          now = datetime.now(jst)

          print(f"[INFO] 当前日本时间: {now.strftime('%Y-%m-%d %H:%M')}")

          accounts_to_renew = []

          with open("/tmp/logs.txt", "r") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "-----" not in line:
                      continue
                  parts = line.split("-----")
                  if len(parts) < 2:
                      continue
                  email = parts[0].strip()
                  next_run_str = parts[1].strip()
                  try:
                      next_run_dt = datetime.strptime(next_run_str, "%Y-%m-%d %H:%M").replace(tzinfo=jst)
                      if now >= next_run_dt:
                          print(f"[INFO] 账号需要续期 → 执行时间已到 ({next_run_str})")
                          accounts_to_renew.append(email)
                      else:
                          print(f"[INFO] 账号跳过 → 下次执行时间 {next_run_str}")
                  except ValueError:
                      print(f"[WARN] 日期解析失败，加入续期列表")
                      accounts_to_renew.append(email)

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              if accounts_to_renew:
                  gh.write(f"need_renew=true\n")
                  gh.write(f"accounts_to_renew={','.join(accounts_to_renew)}\n")
                  print(f"[INFO] 共 {len(accounts_to_renew)} 个账号需要续期")
              else:
                  gh.write("need_renew=false\n")
                  gh.write("accounts_to_renew=\n")
                  print("[INFO] ✅ 所有账号均不需要续期，跳过后续操作")
          PYEOF

      # ========== 以下所有步骤仅在需要续期时执行 ==========
      - name: 拉取私有仓库
        if: steps.check.outputs.need_renew == 'true'
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 启用 WARP 网络
        if: steps.check.outputs.need_renew == 'true'
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        if: steps.check.outputs.need_renew == 'true'
        run: |
          echo "🔧 停用 systemd-resolved，直连 DNS..."
          
          # 停掉 systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          
          # 删掉软链接，写真实文件
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          
          # 防止被覆盖
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          
          # 等 DNS 生效
          sleep 2
          
          echo "🔍 DNS 测试:"
          echo "--- ctrl.lunes.host ---"
          nslookup ctrl.lunes.host 1.1.1.1 || dig ctrl.lunes.host @1.1.1.1 +short || echo "⚠️ 解析失败"
          echo "--- api.github.com ---"
          nslookup api.github.com 1.1.1.1 || echo "⚠️ 解析失败"
          echo "--- 系统级测试 ---"
          getent hosts ctrl.lunes.host || echo "⚠️ getent 失败"
          
          echo ""
          echo "🌍 当前 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "🔍 WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='
          
          echo ""
          echo "📄 /etc/resolv.conf:"
          cat /etc/resolv.conf

      - name: 设置 Python
        if: steps.check.outputs.need_renew == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        if: steps.check.outputs.need_renew == 'true'
        run: |
          pip install playwright httpx
          playwright install --with-deps chromium

      - name: 运行续期脚本
        if: steps.check.outputs.need_renew == 'true'
        env:
          XSERVER_ACCOUNT: ${{ secrets.XSERVER_ACCOUNT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ACCOUNTS_TO_RENEW: ${{ steps.check.outputs.accounts_to_renew }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          LOG_SHA: ${{ steps.check.outputs.log_sha }}
        run: python scripts/XServer/main.py

      - name: 清理旧运行
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
