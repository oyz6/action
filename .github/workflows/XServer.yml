# .github/workflows/XServer.yml
name: XServer 游戏机续期

on:
  schedule:
    - cron: '40 9 * * *'  # 日本时间 18:40
  workflow_dispatch:

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
      # ========== 第一步：通过API读取logs.txt判断是否需要续期 ==========
      - name: 检查是否需要续期
        id: check
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          echo "[INFO] 通过 GitHub API 读取 logs.txt..."

          HTTP_CODE=$(curl -s -o /tmp/logs_response.json -w "%{http_code}" \
            -H "Authorization: token $REPO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/oyz6/scripts/contents/scripts/XServer/logs.txt")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "[WARN] 无法读取 logs.txt (HTTP $HTTP_CODE)，视为全部需要续期"
            echo "need_renew=true" >> $GITHUB_OUTPUT
            echo "accounts_to_renew=ALL" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 解码 base64 内容
          cat /tmp/logs_response.json | python3 -c "
          import sys, json, base64
          data = json.load(sys.stdin)
          content = base64.b64decode(data['content']).decode('utf-8')
          print(content)
          " > /tmp/logs.txt

          echo "[INFO] logs.txt 内容："
          cat /tmp/logs.txt

          # 获取文件 SHA（后续更新用）
          LOG_SHA=$(cat /tmp/logs_response.json | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "log_sha=$LOG_SHA" >> $GITHUB_OUTPUT

          # 判断哪些账号需要续期（到期日 <= 今天+7天 的才续期）
          python3 << 'PYEOF'
          import os, sys
          from datetime import datetime, timedelta, timezone

          jst = timezone(timedelta(hours=9))
          now = datetime.now(jst)
          threshold = now + timedelta(days=7)

          print(f"[INFO] 当前日本时间: {now.strftime('%Y-%m-%d %H:%M')}")
          print(f"[INFO] 续期阈值 (7天内到期): {threshold.strftime('%Y-%m-%d %H:%M')}")

          accounts_to_renew = []

          with open("/tmp/logs.txt", "r") as f:
              for line in f:
                  line = line.strip()
                  if not line or line.startswith("#") or "-----" not in line:
                      continue
                  parts = line.split("-----")
                  if len(parts) < 2:
                      continue
                  email = parts[0].strip()
                  expire_str = parts[1].strip()
                  try:
                      expire_dt = datetime.strptime(expire_str, "%Y-%m-%d %H:%M").replace(tzinfo=jst)
                      days_left = (expire_dt - now).days
                      if expire_dt <= threshold:
                          print(f"[INFO] {email}: 到期 {expire_str} (剩余 {days_left} 天) → 需要续期")
                          accounts_to_renew.append(email)
                      else:
                          print(f"[INFO] {email}: 到期 {expire_str} (剩余 {days_left} 天) → 跳过")
                  except ValueError as e:
                      print(f"[WARN] {email}: 日期解析失败 ({expire_str})，加入续期列表")
                      accounts_to_renew.append(email)

          with open(os.environ["GITHUB_OUTPUT"], "a") as gh:
              if accounts_to_renew:
                  gh.write(f"need_renew=true\n")
                  gh.write(f"accounts_to_renew={','.join(accounts_to_renew)}\n")
                  print(f"[INFO] 共 {len(accounts_to_renew)} 个账号需要续期")
              else:
                  gh.write("need_renew=false\n")
                  gh.write("accounts_to_renew=\n")
                  print("[INFO] ✅ 所有账号均不需要续期，跳过后续操作")
          PYEOF

      # ========== 以下所有步骤仅在需要续期时执行 ==========
      - name: 拉取私有仓库
        if: steps.check.outputs.need_renew == 'true'
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Node.js
        if: steps.check.outputs.need_renew == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        if: steps.check.outputs.need_renew == 'true'
        run: |
          cd scripts/XServer
          npm init -y
          npm install playwright

      - name: 安装浏览器
        if: steps.check.outputs.need_renew == 'true'
        run: npx playwright install --with-deps chrome

      - name: 安装并启动代理
        if: steps.check.outputs.need_renew == 'true'
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 10809, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path_val = unquote(params.get("path", ["/"])[0])
              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")
              outbound = {
                  "protocol": "vless",
                  "settings": {"vnext": [{"address": address, "port": int(port), "users": [{"id": uuid, "encryption": "none"}]}]},
                  "streamSettings": {"network": network, "security": security}
              }
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {"serverName": sni, "fingerprint": fp, "publicKey": pbk}
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {"serviceName": service_name}
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path_val = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")
              outbound = {
                  "protocol": "vmess",
                  "settings": {"vnext": [{"address": address, "port": port, "users": [{"id": uuid, "alterId": aid, "security": "auto"}]}]},
                  "streamSettings": {"network": network, "security": "tls" if tls == "tls" else "none"}
              }
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {"serverName": sni, "fingerprint": fp, "allowInsecure": False}
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path_val = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]
              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")
              outbound = {
                  "protocol": "trojan",
                  "settings": {"servers": [{"address": address, "port": int(port), "password": password}]},
                  "streamSettings": {"network": network, "security": "tls", "tlsSettings": {"serverName": sni, "fingerprint": fp, "allowInsecure": False}}
              }
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {"path": path_val, "headers": {"Host": host}}
              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)
              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")
              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {"servers": [{"address": address, "port": int(port), "method": method, "password": password}]}
              }
              config["outbounds"].append(outbound)

          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SOCKS5=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: 运行续期脚本
        if: steps.check.outputs.need_renew == 'true'
        env:
          XSERVER_ACCOUNT: ${{ secrets.XSERVER_ACCOUNT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
          ACCOUNTS_TO_RENEW: ${{ steps.check.outputs.accounts_to_renew }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          LOG_SHA: ${{ steps.check.outputs.log_sha }}
        run: node scripts/XServer/main.js

      - name: 上传截图
        if: always() && steps.check.outputs.need_renew == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "screenshots/*.png"
          retention-days: 5

      - name: 清理旧运行
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
