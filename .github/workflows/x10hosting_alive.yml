name: x10hosting 保活

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # 北京时间 10:00

jobs:
  keepalive:
    name: 执行保活
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖与 Python 包
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg mesa-utils \
            libgl1-mesa-glx libgl1-mesa-dri \
            flac sox

          pip install --quiet \
            playwright \
            requests \
            SpeechRecognition \
            pydub

          python -m playwright install --with-deps chromium

      - name: 设置代理
        env:
          NODE_LINK: ${{ secrets.PROXY_NODE_ISP }}  # 改为对应节点变量名 美国 加利福尼亚州 洛杉矶 - ISP
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "❌ 代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ x10hosting 保活失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 执行保活脚本
        env:
          X10HOSTING: ${{ secrets.X10HOSTING }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python scripts/x10hosting/main.py

      - name: 清理旧工作流运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
