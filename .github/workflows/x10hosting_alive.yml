name: x10hosting 保活

on:
#  schedule:
#    - cron: '0 8 * * *'   # 每天 UTC 08:00 执行
  workflow_dispatch:

jobs:
  keepalive:
    name: 执行保活
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb fonts-noto-cjk fonts-wqy-zenhei p7zip-full

      - name: 安装 Playwright 及 Python 库
        run: |
          pip install -q playwright requests
          playwright install chromium

      - name: 下载并解压 Buster 扩展
        run: |
          mkdir -p scripts/extensions/buster
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.4.0/buster_captcha_solver_for_humans-3.4.0-chrome.zip
          7z x -y scripts/extensions/buster/buster.zip \
            -oscripts/extensions/buster/unpacked

      - name: 设置代理
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "❌ 代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ x10hosting 保活失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 执行 x10hosting 保活
        env:
          X10HOSTING: ${{ secrets.X10HOSTING }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          xvfb-run -a --server-args="-screen 0 1280x900x24" \
            python -u scripts/x10hosting/main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: x10hosting-screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
