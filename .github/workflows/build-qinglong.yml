name: 构建青龙面板 AMD64

on:
  workflow_dispatch:
    inputs:
      version:
        description: '青龙版本号 (留空自动获取)'
        required: false
        default: ''
#  schedule:
#    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # 从 Docker Hub 获取最新 debian 版本
            VERSION=$(curl -sL "https://hub.docker.com/v2/repositories/whyour/qinglong/tags?page_size=100" | jq -r '.results[].name' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-debian$' | sed 's/-debian$//' | sort -V | tail -1)
            
            if [ -z "$VERSION" ]; then
              VERSION="2.20.2"
              echo "Using fallback version"
            fi
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Check if release exists
        id: check
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASE=$(curl -sL https://api.github.com/repos/${{ github.repository }}/releases/tags/ql-v$VERSION || echo "")
          if echo "$RELEASE" | grep -q '"id"'; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ql-v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Will create release ql-v$VERSION"
          fi
      
      - name: Extract from Docker image
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IMAGE="ghcr.io/whyour/qinglong:${VERSION}-debian"
          
          echo "Pulling image: $IMAGE"
          docker pull $IMAGE
          
          CONTAINER_ID=$(docker create $IMAGE)
          mkdir -p ql
          docker cp $CONTAINER_ID:/ql/. ql/
          docker rm $CONTAINER_ID
          
          echo "=== Extracted files ==="
          ls -la ql/
      
      - name: Setup Node.js
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Rebuild native modules
        if: steps.check.outputs.exists == 'false'
        run: |
          cd ql
          if [ -f "package.json" ]; then
            npm rebuild 2>/dev/null || true
          fi
      
      - name: Clean up
        if: steps.check.outputs.exists == 'false'
        run: |
          cd ql
          
          rm -rf .git .github .vscode docker 2>/dev/null || true
          rm -f *.md CHANGELOG* Dockerfile* docker-compose* 2>/dev/null || true
          rm -f .dockerignore .editorconfig .gitignore 2>/dev/null || true
          
          if [ -d "node_modules" ]; then
            find node_modules -name "*.md" -type f -delete 2>/dev/null || true
            find node_modules -name "*.map" -type f -delete 2>/dev/null || true
            find node_modules -name "LICENSE*" -type f -delete 2>/dev/null || true
            find node_modules -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
            find node_modules -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true
            find node_modules -type d -name "docs" -exec rm -rf {} + 2>/dev/null || true
          fi
          
          echo "=== Final structure ==="
          ls -la
          du -sh .
      
      - name: Create app.js wrapper
        if: steps.check.outputs.exists == 'false'
        run: |
          cd ql
          
          cat > app.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          // 固定端口 8100
          process.env.QL_PORT = '8100';
          process.env.QL_DIR = process.env.QL_DIR || path.join(__dirname, 'data');
          process.env.NODE_ENV = 'production';
          
          // 确保数据目录存在
          const dataDir = process.env.QL_DIR;
          if (!fs.existsSync(dataDir)) {
            fs.mkdirSync(dataDir, { recursive: true });
          }
          
          // 查找并启动主程序
          const possiblePaths = [
            './static/build/app.js',
            './dist/app.js',
            './build/app.js'
          ];
          
          let started = false;
          for (const p of possiblePaths) {
            if (fs.existsSync(path.join(__dirname, p))) {
              console.log('Starting QingLong on port 8100...');
              console.log('Entry:', p);
              require(p);
              started = true;
              break;
            }
          }
          
          if (!started) {
            console.error('Error: Cannot find app entry');
            console.log('Available files:', fs.readdirSync(__dirname));
            process.exit(1);
          }
          EOF
      
      - name: Package
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          tar -czvf qinglong-v${VERSION}.tar.gz ql
          ls -lh qinglong-*.tar.gz
      
      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ql-v${{ steps.version.outputs.version }}
          name: 青龙面板 v${{ steps.version.outputs.version }}
          body: |
            ## 青龙面板 v${{ steps.version.outputs.version }} 预构建版
            
            从 Docker 镜像 `ghcr.io/whyour/qinglong:${{ steps.version.outputs.version }}-debian` 提取
            
            **端口: 8100**
            
            ### 📦 一键安装
            
            ```bash
            bash <(curl -sL https://raw.githubusercontent.com/${{ github.repository }}/main/sh/qinglong-install.sh)
