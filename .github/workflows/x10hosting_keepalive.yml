name: x10hosting 保活

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'   # 北京时间 10:30

jobs:
  keepalive:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg fonts-noto-cjk p7zip-full

      - name: 安装 Python 包
        run: |
          pip install playwright requests SpeechRecognition pydub
          playwright install chromium

      - name: 设置代理
        env:
          NODE_LINK: ${{ secrets.PROXY_NODE_ISP }}  # 改为对应节点变量名 美国 加利福尼亚州 洛杉矶 - ISP
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ x10hosting 保活失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 运行保活脚本
        env:
          X10HOSTING: ${{ secrets.X10HOSTING }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
          DISPLAY: :99
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1280x720x24 -ac" \
            python scripts/x10hosting/x10hosting_keepalive.py

      - name: 清理旧运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
