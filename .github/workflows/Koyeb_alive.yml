name: Koyeb登录保活

on:
  schedule:
    - cron: '12 3 * * 0'  # 每周日执行一次
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: 拉取私有仓库
      uses: actions/checkout@v4
      with:
        repository: oyz6/scripts
        token: ${{ secrets.REPO_TOKEN }}
        path: .
    
    - name: 设置 Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.x'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/Koyeb/requirements.txt
    
    - name: 执行保活脚本
      env:
        KOYEB_LOGIN: ${{ secrets.KOYEB_LOGIN }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python scripts/Koyeb/Koyeb_alive.py
