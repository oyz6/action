name: 编译 musl 版本 sbx.so (sing-box v1.13.13)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]          # 如需 arm64 可扩展
    env:
      GO_VERSION: "1.22"      # sing-box v1.13.13 要求的 Go 版本
      SING_BOX_VERSION: "v1.13.13"

    steps:
      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: ${{ env.SING_BOX_VERSION }}
          path: sing-box

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev musl binutils

      - name: Build sing-box static binary (musl)
        run: |
          cd sing-box
          CGO_ENABLED=1 CC=musl-gcc GOOS=linux GOARCH=${{ matrix.arch }} \
            go build -ldflags '-s -w -extldflags "-static"' -o ../sing-box ./cmd/sing-box
          cd ..
          file sing-box
          # 确认是静态链接
          ldd sing-box 2>&1 | grep -q "not a dynamic executable" || echo "Warning: not static"

      - name: Create C launcher and embed binary
        run: |
          # 将 sing-box 二进制转换为目标文件
          objcopy -I binary -O elf64-x86-64 -B i386:x86-64 sing-box sing-box.o

          # 生成 C 启动器代码
          cat > launcher.c << 'EOF'
          #define _GNU_SOURCE
          #include <stdio.h>
          #include <stdlib.h>
          #include <string.h>
          #include <unistd.h>
          #include <sys/mman.h>
          #include <sys/syscall.h>
          #include <signal.h>
          #include <errno.h>

          extern const unsigned char _binary_sing_box_start[];
          extern const unsigned char _binary_sing_box_end[];

          static pid_t child_pid = 0;

          int StartSingBox(const char *config_path) {
              if (child_pid > 0) {
                  // 已经运行，可先停止旧的
                  kill(child_pid, SIGTERM);
                  child_pid = 0;
              }

              int fd = syscall(SYS_memfd_create, "singbox", 0);
              if (fd == -1) {
                  // 尝试使用 shm_open 作为备选
                  fd = shm_open("/singbox_exec", O_CREAT | O_RDWR, 0700);
                  if (fd == -1) {
                      perror("memfd_create/shm_open");
                      return -1;
                  }
                  // 立即删除，以便其他进程可以重用名称
                  shm_unlink("/singbox_exec");
              }

              size_t size = _binary_sing_box_end - _binary_sing_box_start;
              if (write(fd, _binary_sing_box_start, size) != size) {
                  perror("write");
                  close(fd);
                  return -1;
              }

              pid_t pid = fork();
              if (pid == -1) {
                  perror("fork");
                  close(fd);
                  return -1;
              }
              if (pid == 0) {
                  // 子进程：构造 /proc/self/fd/... 路径并执行
                  char fd_path[64];
                  snprintf(fd_path, sizeof(fd_path), "/proc/self/fd/%d", fd);
                  // 关闭不需要的文件描述符
                  close(0); close(1); close(2);
                  execl(fd_path, "sing-box", "run", "-c", config_path, NULL);
                  perror("execl");
                  _exit(1);
              }

              close(fd);
              child_pid = pid;
              return 0;
          }

          int StopSingBox() {
              if (child_pid > 0) {
                  kill(child_pid, SIGTERM);
                  child_pid = 0;
              }
              return 0;
          }
          EOF

          # 编译共享库
          musl-gcc -shared -fPIC -o sbx.so launcher.c sing-box.o -lrt
          file sbx.so
          # 确认导出函数
          nm -D sbx.so | grep -E "StartSingBox|StopSingBox"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbx-embedded-${{ matrix.arch }}
          path: sbx.so
