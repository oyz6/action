name: 编译 musl 版本 sbx.so (sing-box v1.13.13)

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]
        # 如需 arm64，添加 arm64 并配置交叉编译器（见文末说明）
    env:
      GO_VERSION: "1.22"
    steps:
      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.13.13
          path: sing-box-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          musl-gcc --version

      - name: Prepare wrapper code
        run: |
          mkdir -p wrapper
          cat > wrapper/main.go << 'EOF'
          package main

          import "C"
          import (
              "encoding/json"

              box "github.com/sagernet/sing-box"
              "github.com/sagernet/sing-box/option"
          )

          var instance *box.Box

          //export StartSingBox
          func StartSingBox(configJson *C.char) C.int {
              var opt option.Options
              err := json.Unmarshal([]byte(C.GoString(configJson)), &opt)
              if err != nil {
                  return -1
              }
              b, err := box.New(box.Options{Options: opt})
              if err != nil {
                  return -1
              }
              instance = b
              go func() {
                  _ = b.Start()   // Start 会阻塞，直到 Close 被调用
              }()
              return 0
          }

          //export StopSingBox
          func StopSingBox() C.int {
              if instance != nil {
                  instance.Close()
                  instance = nil
              }
              return 0
          }

          func main() {}
          EOF

          cd wrapper
          go mod init sbx
          go mod edit -replace github.com/sagernet/sing-box=../sing-box-src
          go mod tidy

      - name: Build sbx.so (musl static)
        run: |
          cd wrapper
          export CGO_CFLAGS="-ftls-model=global-dynamic"
          CGO_ENABLED=1 \
          CC=musl-gcc \
          GOOS=linux \
          GOARCH=${{ matrix.arch }} \
          go build -buildmode=c-shared \
              -ldflags '-linkmode external -extldflags "-static"' \
              -o sbx.so .

      - name: Verify binary
        run: |
          file wrapper/sbx.so
          ldd wrapper/sbx.so 2>&1 | tee ldd_output.txt
          if grep -q "musl\|statically linked" ldd_output.txt; then
            echo "OK: musl static build confirmed"
          else
            echo "WARNING: unexpected link output"
          fi
          objdump -T wrapper/sbx.so | grep -q __vfprintf_chk && echo "ERROR: glibc symbols found!" && exit 1 || echo "OK: no glibc symbols"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbx-musl-${{ matrix.arch }}
          path: wrapper/sbx.so
