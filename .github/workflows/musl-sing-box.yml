name: 编译 musl 版本 sbx.so (sing-box v1.13.13)

on:
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64]   # 若需 arm64，添加 arm64 并安装交叉编译工具
    env:
      GO_VERSION: "1.22"   # sing-box v1.13.13 要求的 Go 版本
    steps:
      - name: Checkout sing-box source
        uses: actions/checkout@v4
        with:
          repository: SagerNet/sing-box
          ref: v1.13.13
          path: sing-box-src

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev musl
          # 确认 musl-gcc 可用
          musl-gcc --version

      - name: Prepare wrapper code
        run: |
          mkdir -p wrapper
          cat > wrapper/main.go << 'EOF'
          package main

          import "C"
          import (
              "encoding/json"

              box "github.com/sagernet/sing-box"
              "github.com/sagernet/sing-box/option"
          )

          var instance *box.Box

          //export StartSingBox
          func StartSingBox(configJson *C.char) C.int {
              var opt option.Options
              err := json.Unmarshal([]byte(C.GoString(configJson)), &opt)
              if err != nil {
                  return -1
              }
              b, err := box.New(box.Options{Options: opt})
              if err != nil {
                  return -1
              }
              instance = b
              go func() {
                  _ = b.Start()
              }()
              return 0
          }

          //export StopSingBox
          func StopSingBox() C.int {
              if instance != nil {
                  instance.Close()
                  instance = nil
              }
              return 0
          }

          func main() {}
          EOF

          cd wrapper
          go mod init sbx
          go mod edit -replace github.com/sagernet/sing-box=../sing-box-src
          go mod tidy

      - name: Build sbx.so (dynamic musl)
        run: |
          cd wrapper
          CGO_ENABLED=1 \
          CC=musl-gcc \
          GOOS=linux \
          GOARCH=${{ matrix.arch }} \
          go build -buildmode=c-shared \
              -o sbx.so .

      - name: Verify binary
        run: |
          echo "=== File type ==="
          file wrapper/sbx.so
          echo "=== Dynamic dependencies (should show musl) ==="
          ldd wrapper/sbx.so || true
          echo "=== Check for glibc symbols ==="
          objdump -T wrapper/sbx.so | grep -q __vfprintf_chk && echo "ERROR: glibc symbols found!" && exit 1 || echo "OK: no glibc symbols"
          echo "=== Check for initial-exec TLS ==="
          readelf -d wrapper/sbx.so | grep TLS || echo "No TLS info, or model is safe."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbx-musl-${{ matrix.arch }}
          path: wrapper/sbx.so
