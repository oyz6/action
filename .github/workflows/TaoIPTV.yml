name: TaoIPTV 爬虫

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .  # 拉到根目录

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install seleniumbase requests pyvirtualdisplay pysocks
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          seleniumbase install chromedriver

      - name: 恢复浏览器状态缓存
        uses: actions/cache@v4
        with:
          path: taoiptv-state.json
          key: taoiptv-state-${{ github.run_id }}
          restore-keys: taoiptv-state-

      - name: 启动 Hysteria2 代理
        if: steps.config.outputs.HY2_URL != ''
        run: |
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          
          HY2_URL="${{ steps.config.outputs.HY2_URL }}"
          URL_BODY="${HY2_URL#hysteria2://}"
          URL_BODY="${URL_BODY%%#*}"
          PASSWORD="${URL_BODY%%@*}"
          SERVER="${URL_BODY#*@}"
          SERVER="${SERVER%%\?*}"
          PARAMS="${URL_BODY#*\?}"
          
          SNI=$(echo "$PARAMS" | tr '&' '\n' | grep "^sni=" | cut -d'=' -f2)
          INSECURE=$(echo "$PARAMS" | tr '&' '\n' | grep "^insecure=" | cut -d'=' -f2)
          [ "$INSECURE" = "1" ] && INSECURE="true" || INSECURE="false"
          
          cat > hy2-config.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: ${INSECURE}
          socks5:
            listen: 127.0.0.1:1080
          EOF
          
          ./hysteria client -c hy2-config.yaml &
          sleep 5
          
          RAW_IP=$(curl -s --proxy socks5://127.0.0.1:1080 https://api.ipify.org)
          if [ -n "$RAW_IP" ]; then
            FIRST=$(echo "$RAW_IP" | cut -d'.' -f1)
            LAST=$(echo "$RAW_IP" | cut -d'.' -f4)
            echo "${FIRST}.*******.${LAST} ✅ 代理就绪"
          else
            echo "❌ 代理连接失败"
            exit 1
          fi

      - name: 运行爬虫
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/taoiptv.py

      - name: 上传调试截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-screenshots
          path: |
            *.png
            error.html
          retention-days: 3

      - name: 推送到私有仓库
        if: success()
        env:
          PRIVATE_REPO: ${{ secrets.PRIVATE_REPO }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO" ] || [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "未配置私有仓库，跳过"
            exit 0
          fi
          if [ ! -f taoiptv.m3u ]; then
            echo "输出文件不存在"
            exit 1
          fi
          git clone https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${PRIVATE_REPO}.git private-repo
          cp taoiptv.m3u private-repo/
          cd private-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taoiptv.m3u
          git diff --cached --quiet || git commit -m "更新 taoiptv.m3u $(date '+%Y-%m-%d %H:%M')"
          git push
