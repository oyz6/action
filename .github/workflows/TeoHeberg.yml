name: TeoHeberg 续期

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天早上 08:33 运行
    - cron: '33 0 * * *'

jobs:
  run:
    name: 执行续期
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Xray 代理核心
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      - name: 生成 Xray 代理配置
        env:
          PROXY_URL: ${{ secrets.PROXY_NODE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          from urllib.parse import parse_qs, unquote, urlparse

          proxy_url = os.environ["PROXY_URL"]
          parsed = urlparse(proxy_url)
          scheme = parsed.scheme

          if scheme not in {"vless", "vmess"}:
              raise SystemExit(f"Unsupported proxy scheme: {scheme}")

          def build_stream_settings(query, host):
              transport_type = query.get("type", "tcp")
              if transport_type == "h2":
                  transport_type = "http"

              stream_settings = {
                  "network": transport_type,
                  "security": query.get("security", "none"),
              }

              if stream_settings["security"] == "reality":
                  reality = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                      "publicKey": query.get("pbk", ""),
                  }
                  if query.get("sid"):
                      reality["shortId"] = query["sid"]
                  if query.get("spx"):
                      reality["spiderX"] = query["spx"]
                  stream_settings["realitySettings"] = reality
              elif stream_settings["security"] == "tls":
                  stream_settings["tlsSettings"] = {
                      "serverName": query.get("sni", host),
                      "fingerprint": query.get("fp", "chrome"),
                  }

              if transport_type == "tcp":
                  header_type = query.get("headerType", "none")
                  stream_settings["tcpSettings"] = {
                      "header": {"type": header_type}
                  }
              elif transport_type == "ws":
                  headers = {}
                  if query.get("host"):
                      headers["Host"] = query["host"]
                  stream_settings["wsSettings"] = {
                      "path": query.get("path", "/"),
                      "headers": headers,
                  }
              elif transport_type == "http":
                  host_list = [h for h in query.get("host", "").split(",") if h]
                  stream_settings["httpSettings"] = {
                      "host": host_list,
                      "path": query.get("path", "/"),
                  }
              elif transport_type == "grpc":
                  stream_settings["grpcSettings"] = {
                      "serviceName": query.get("serviceName", ""),
                      "authority": query.get("authority", ""),
                  }

              return stream_settings

          if scheme == "vless":
              qs = {k: v[-1] for k, v in parse_qs(parsed.query).items()}
              host = parsed.hostname
              port = parsed.port
              user_id = unquote(parsed.username or "")

              if not host or not port or not user_id:
                  raise SystemExit("Invalid VLESS URL: missing host, port, or uuid")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "encryption": qs.get("encryption", "none"),
                              "flow": qs.get("flow", ""),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(qs, host),
              }
          else:
              payload = parsed.netloc + parsed.path
              padded = payload + "=" * (-len(payload) % 4)
              vmess = json.loads(base64.urlsafe_b64decode(padded).decode("utf-8"))
              host = vmess.get("add")
              port = int(vmess.get("port", 0))
              user_id = vmess.get("id", "")
              if not host or not port or not user_id:
                  raise SystemExit("Invalid VMess URL: missing host, port, or uuid")

              query = {
                  "type": vmess.get("net", "tcp"),
                  "security": vmess.get("tls", "none"),
                  "path": vmess.get("path", "/") or "/",
                  "host": vmess.get("host", ""),
                  "sni": vmess.get("sni", "") or host,
                  "fp": vmess.get("fp", "chrome"),
                  "serviceName": vmess.get("path", ""),
                  "authority": vmess.get("host", ""),
                  "headerType": vmess.get("type", "none") or "none",
              }

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": host,
                          "port": port,
                          "users": [{
                              "id": user_id,
                              "alterId": int(vmess.get("aid", 0) or 0),
                              "security": vmess.get("scy", "auto"),
                          }],
                      }]
                  },
                  "streamSettings": build_stream_settings(query, host),
              }

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [{
                  "listen": "127.0.0.1",
                  "port": 8080,
                  "protocol": "http",
              }],
              "outbounds": [outbound],
          }

          with open("xray-config.json", "w", encoding="ascii") as f:
              json.dump(config, f, indent=2)
          PY

      - name: 启动 Xray 代理
        run: |
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          sed -n '1,20p' xray.log || true

      - name: 安装系统依赖与浏览器自动化组件
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb p7zip-full \
            mesa-utils libgl1-mesa-glx libgl1-mesa-dri
          npm init -y --silent
          npm install --silent playwright
          npx playwright install --with-deps chromium 2>&1 | tail -5
          
          # 确保扩展路径与 main.js 一致 (main.js 位于 scripts/TeoHeberg/，扩展在 ../extensions/...)
          mkdir -p scripts/TeoHeberg/extensions/buster/unpacked
          mkdir -p scripts/TeoHeberg/extensions/turnstile-bypasser/unpacked
          
          # Buster 扩展
          wget -qO buster.zip https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          7z x -y buster.zip -oscripts/TeoHeberg/extensions/buster/unpacked > /dev/null
          
          # Turnstile Bypasser 扩展
          curl -sL "https://clients2.google.com/service/update2/crx?response=redirect&prodversion=131.0.0.0&acceptformat=crx2,crx3&x=id%3Ddockglonapofdibnccbnendkgdmhdplk%26installsource%3Dondemand%26uc" -o turnstile.crx
          7z x -y turnstile.crx -oscripts/TeoHeberg/extensions/turnstile-bypasser/unpacked > /dev/null

      - name: 创建 Chromium 包装脚本（强制软件渲染）
        run: |
          # 定位 Playwright 下载的 Chromium 可执行文件
          CHROME_PATH=$(find ~/.cache/ms-playwright -name chrome -type f | head -1)
          if [ -z "$CHROME_PATH" ]; then
            echo "❌ 未找到 Chromium 可执行文件"
            exit 1
          fi
          
          # 创建包装脚本，注入 GPU 禁用及软件渲染参数
          cat > chromium-wrapper.sh << EOF
          #!/bin/bash
          exec "$CHROME_PATH" \\
            --disable-gpu \\
            --disable-gpu-compositing \\
            --disable-software-rasterizer \\
            --use-gl=swiftshader \\
            --disable-dev-shm-usage \\
            --no-sandbox \\
            "\$@"
          EOF
          
          chmod +x chromium-wrapper.sh
          echo "✅ Chromium 包装脚本已创建，路径：$(pwd)/chromium-wrapper.sh"

      - name: 检查代理出口 IP
        run: |
          curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org && echo
          curl -s --proxy http://127.0.0.1:8080 https://ipinfo.io

      - name: 执行续期
        env:
          teohe_ACCOUNTS: ${{ secrets.TEOHEBERG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BYPASS_PROXY: http://127.0.0.1:8080
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          # 关键：让 Playwright 使用我们的包装脚本启动 Chromium
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ github.workspace }}/chromium-wrapper.sh
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            node scripts/TeoHeberg/main.js

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 运行截图
          path: screenshots/*
          retention-days: 1

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
