name: TeoHeberg 续期

on:
  workflow_dispatch:
  schedule:
    # 北京时间每天早上 08:33 运行
    - cron: '33 0 * * *'

jobs:
  run:
    name: 执行续期
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Xray 代理核心
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray-bin
          unzip -oq Xray-linux-64.zip -d xray-bin
          chmod +x xray-bin/xray
          sudo mv xray-bin/xray /usr/local/bin/xray

      - name: 生成 Xray 代理配置
        env:
          PROXY_URL: ${{ secrets.PROXY_NODE }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os

          proxy_url = os.environ["PROXY_URL"]
          if proxy_url.startswith("vmess://"):
              raw = proxy_url[8:]
              decoded = base64.b64decode(raw).decode("utf-8")
              vmess = json.loads(decoded)

              config = {
                  "log": {"loglevel": "warning"},
                  "inbounds": [
                      {
                          "port": 8080,
                          "protocol": "http",
                          "settings": {"auth": "noauth"},
                          "listen": "127.0.0.1",
                          "sniffing": {"enabled": True, "destOverride": ["http", "tls"]}
                      },
                      {
                          "port": 1080,
                          "protocol": "socks",
                          "settings": {"auth": "noauth", "udp": True},
                          "listen": "127.0.0.1",
                          "sniffing": {"enabled": True, "destOverride": ["http", "tls"]}
                      }
                  ],
                  "outbounds": [
                      {
                          "protocol": "vmess",
                          "settings": {
                              "vnext": [
                                  {
                                      "address": vmess["add"],
                                      "port": int(vmess["port"]),
                                      "users": [
                                          {
                                              "id": vmess["id"],
                                              "security": vmess.get("scy", "auto"),
                                              "alterId": int(vmess.get("aid", 0))
                                          }
                                      ]
                                  }
                              ]
                          },
                          "streamSettings": {
                              "network": vmess.get("net", "tcp"),
                              "security": vmess.get("tls", ""),
                              "tcpSettings": None,
                              "wsSettings": None
                          },
                          "tag": "proxy"
                      }
                  ]
              }
              if vmess.get("net") == "ws":
                  config["outbounds"][0]["streamSettings"]["wsSettings"] = {
                      "path": vmess.get("path", "/"),
                      "headers": {"Host": vmess.get("host", vmess["add"])}
                  }
              if vmess.get("tls") == "tls":
                  config["outbounds"][0]["streamSettings"]["security"] = "tls"
                  config["outbounds"][0]["streamSettings"]["tlsSettings"] = {
                      "allowInsecure": True,
                      "serverName": vmess.get("sni", vmess["add"])
                  }
          else:
              raise ValueError("Only vmess:// proxy URL is supported")

          with open("xray-config.json", "w") as f:
              json.dump(config, f, indent=2)
          PY

      - name: 启动 Xray 代理
        run: |
          nohup xray run -c xray-config.json > xray.log 2>&1 &
          sleep 2
          xray version
          sed -n '1,20p' xray.log || true

      - name: 安装系统依赖与浏览器自动化组件
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo -E apt-get update -qq
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb p7zip-full \
            mesa-utils libgl1-mesa-glx libgl1-mesa-dri
          sudo -E apt-get install -y -qq -o Dpkg::Use-Pty=0 xvfb p7zip-full 2>&1 | tail -5
          npm init -y --silent
          npm install --silent playwright
          npx playwright install --with-deps chromium 2>&1 | tail -5

          # 确保扩展路径与 main.js 一致 (main.js 位于 scripts/TeoHeberg/，扩展在 ../extensions/...)
          mkdir -p scripts/TeoHeberg/extensions/buster/unpacked
          mkdir -p scripts/TeoHeberg/extensions/turnstile-bypasser/unpacked

          # Buster 扩展
          wget -qO buster.zip https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          7z x -y buster.zip -oscripts/TeoHeberg/extensions/buster/unpacked > /dev/null

          # Turnstile Bypasser 扩展
          curl -sL "https://clients2.google.com/service/update2/crx?response=redirect&prodversion=131.0.0.0&acceptformat=crx2,crx3&x=id%3Ddockglonapofdibnccbnendkgdmhdplk%26installsource%3Dondemand%26uc" -o turnstile.crx
          7z x -y turnstile.crx -oscripts/TeoHeberg/extensions/turnstile-bypasser/unpacked > /dev/null

      - name: 创建 Chromium 包装脚本（强制软件渲染）
        run: |
          # 定位 Playwright 下载的 Chromium 可执行文件
          CHROME_PATH=$(find ~/.cache/ms-playwright -name chrome -type f | head -1)
          if [ -z "$CHROME_PATH" ]; then
            echo "❌ 未找到 Chromium 可执行文件"
            exit 1
          fi

          # 创建包装脚本，注入 GPU 禁用及软件渲染参数
          cat > chromium-wrapper.sh << EOF
          #!/bin/bash
          exec "$CHROME_PATH" \\
            --disable-gpu \\
            --disable-gpu-compositing \\
            --disable-software-rasterizer \\
            --use-gl=swiftshader \\
            --disable-dev-shm-usage \\
            --no-sandbox \\
            "\$@"
          EOF

          chmod +x chromium-wrapper.sh
          echo "✅ Chromium 包装脚本已创建，路径：$(pwd)/chromium-wrapper.sh"

      - name: 检查代理出口 IP
        run: |
          curl -s --proxy http://127.0.0.1:8080 https://api.ipify.org && echo
          curl -s --proxy http://127.0.0.1:8080 https://ipinfo.io

      - name: 执行续期
        env:
          teohe_ACCOUNTS: ${{ secrets.TEOHEBERG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          BYPASS_PROXY: http://127.0.0.1:8080
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          # 关键：让 Playwright 使用我们的包装脚本启动 Chromium
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${{ github.workspace }}/chromium-wrapper.sh
        run: |
          mkdir -p screenshots
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            node scripts/TeoHeberg/main.js

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 运行截图
          path: screenshots/*
          retention-days: 1

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
