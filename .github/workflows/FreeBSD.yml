name: 预编译 grpcio wheel FreeBSD

on:
  workflow_dispatch:
    inputs:
      grpcio-version:
        description: 'grpcio version to build (e.g. 1.82.1)'
        required: true
        default: '1.82.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheel on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: "14.2"
          # 不用 prepare，全部放到 run 中
          run: |
            set -e
            echo "===== 1. Install dependencies ====="
            # 安装 Python、编译器及 grpcio 编译所需的库
            sudo pkg install -y python311 cmake gcc git bash openssl c-ares re2 pkgconf

            echo "===== 2. Upgrade pip/setuptools/wheel ====="
            python3.11 -m pip install --upgrade pip setuptools wheel

            echo "===== 3. Build grpcio wheel ====="
            export GRPC_PYTHON_BUILD_EXT_COMPILER_JOBS=2
            python3.11 -m pip wheel \
              --wheel-dir /tmp/wheels \
              --no-cache-dir \
              --verbose \
              grpcio==${{ github.event.inputs.grpcio-version }}

            # 复制 wheel 到当前工作目录（用于 artifact 上传）
            cp /tmp/wheels/*.whl .
            echo "===== 4. Wheel built successfully ====="
            ls -l *.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpcio-freebsd-wheel
          path: "*.whl"
