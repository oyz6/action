name: 预编译 FreeBSD wheel

on:
  workflow_dispatch:
    inputs:
      grpcio-version:
        description: 'grpcio version (e.g. 1.82.1)'
        required: true
        default: '1.82.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheel on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: "14.2"
          prepare: |
            # 安装编译工具，python311 自带 pip
            pkg install -y python311 cmake gcc git bash
            # 升级 pip（可选，但推荐）
            python3.11 -m pip install --upgrade pip setuptools wheel
          run: |
            # 限制并行编译数，避免资源不足
            export GRPC_PYTHON_BUILD_EXT_COMPILER_JOBS=2
            # 编译并生成 wheel
            python3.11 -m pip wheel \
              --wheel-dir /tmp/wheels \
              --no-cache-dir \
              --verbose \
              grpcio==${{ github.event.inputs.grpcio-version }}
            # 复制 wheel 到工作目录
            cp /tmp/wheels/*.whl .
            echo "=== Built wheel ==="
            ls -l *.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpcio-freebsd-wheel
          path: "*.whl"
