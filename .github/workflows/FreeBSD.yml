name: 预编译 grpcio wheel FreeBSD

on:
  workflow_dispatch:
    inputs:
      grpcio-version:
        description: 'grpcio version (e.g. 1.82.1)'
        required: true
        default: '1.82.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wheel on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          release: "14.2"
          prepare: |
            set -e
            export IGNORE_OSVERSION=yes

            echo "===== 1. Update pkg and install build tools ====="
            pkg update -f
            # 关键：python311 解释器 + pip 包
            pkg install -y python311 py311-pip cmake gcc git bash openssl pkgconf

            echo "===== 2. Upgrade pip, setuptools, wheel ====="
            python3.11 -m pip install --upgrade pip setuptools wheel

            echo "===== 3. Build grpcio wheel ====="
            export GRPC_PYTHON_BUILD_EXT_COMPILER_JOBS=2
            python3.11 -m pip wheel \
              --wheel-dir "$GITHUB_WORKSPACE" \
              --no-cache-dir \
              --verbose \
              grpcio==${{ github.event.inputs.grpcio-version }}

            echo "===== 4. Done ====="
            ls -l "$GITHUB_WORKSPACE"/*.whl

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: grpcio-freebsd-wheel
          path: "*.whl"
