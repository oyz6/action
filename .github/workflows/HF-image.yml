name: 构建探针镜像

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: '镜像名称'
        required: true
        default: 'huggingface-app'
        type: string

jobs:
  build-and-push:
    name: 构建并推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub 容器镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ./docker/huggingface          # 指向 Dockerfile 所在目录
          file: ./docker/huggingface/Dockerfile  # 指定 Dockerfile 路径
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 输出镜像信息
        run: |
          echo "✅ 镜像已推送："
          echo "ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}:latest"

  cleanup:
    name: 清理旧工作流运行
    runs-on: ubuntu-latest
    needs: build-and-push
    if: always()
    permissions:
      actions: write
    steps:
      - name: 删除旧的运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
