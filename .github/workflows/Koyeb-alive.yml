# .github/workflows/koyeb-alive.yml
name: Koyeb Keep Alive

on:
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb scrot
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome.deb || sudo apt-get -f install -y -qq
          rm -f google-chrome.deb
          echo "Chrome: $(google-chrome --version)"

      - name: Install Python deps
        run: |
          pip install -U pip
          pip install seleniumbase pyvirtualdisplay requests pyautogui
          seleniumbase install chromedriver
          sbase install uc_driver

      - name: Run
        env:
          KOYEB_1: ${{ secrets.KOYEB_1 }}
          KOYEB_2: ${{ secrets.KOYEB_2 }}
          KOYEB_3: ${{ secrets.KOYEB_3 }}
          KOYEB_4: ${{ secrets.KOYEB_4 }}
          KOYEB_5: ${{ secrets.KOYEB_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python scripts/Koyeb/Koyeb_alive.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: koyeb-screenshots
          path: scripts/Koyeb/screenshots/
          retention-days: 7
          if-no-files-found: ignore
