name: Koyeb 登录保活

on:
  schedule:
    - cron: '0 4 * * 5'   # 北京时间每周五中午12:00（UTC 时间 04:00）
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb
          # 安装 Chrome
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome.deb || sudo apt-get -f install -y -qq
          rm -f google-chrome.deb
          echo "Chrome: $(google-chrome --version)"

      - name: 安装 Python dependencies
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests pyautogui
          seleniumbase install chromedriver

      - name: 执行保活
        env:
          KOYEB_1: ${{ secrets.KOYEB_1 }}
          KOYEB_2: ${{ secrets.KOYEB_2 }}
          KOYEB_3: ${{ secrets.KOYEB_3 }}
          KOYEB_4: ${{ secrets.KOYEB_4 }}
          KOYEB_5: ${{ secrets.KOYEB_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: ':99'
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python scripts/Koyeb/Koyeb_alive.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: koyeb-screenshots
          path: scripts/Koyeb/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
