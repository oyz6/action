name: Weirdhost warp版1

on:
  schedule:
    - cron: '20 3 * * *'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  add_time:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            xvfb xdotool fonts-nanum ffmpeg p7zip-full
          pip install --no-cache-dir \
            seleniumbase aiohttp pynacl SpeechRecognition pydub

      - name: 下载验证码扩展
        run: |
          mkdir -p scripts/extensions/nopecha
          wget -q -O scripts/extensions/nopecha/chromium.zip \
            https://github.com/NopeCHALLC/nopecha-extension/releases/download/0.6.0/chromium.zip
          7z x -y scripts/extensions/nopecha/chromium.zip -oscripts/extensions/nopecha/unpacked

          # 可选：Buster（reCAPTCHA 辅助，Weirdhost 登录需要）
          mkdir -p scripts/extensions/buster
          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          7z x -y scripts/extensions/buster/buster.zip -oscripts/extensions/buster/unpacked

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sleep 2
          echo "[INFO] DNS 测试:"
          nslookup host2play.gratis 1.1.1.1 || echo "[WARN] 解析失败"
          echo "验证:"
          getent hosts hub.weirdhost.xyz && echo "  ✅ hub.weirdhost.xyz" || echo "  ❌ hub.weirdhost.xyz"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 运行续期脚本
        env:
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RENEW_THRESHOLD_DAYS: "5"
          FREE_RENEW_THRESHOLD_DAYS: "2"
          USE_WARP: "false"
          NOPECHA_KEY: ${{ secrets.NOPECHA_KEY }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python scripts/Weirdhost/WARP/weirdhost_renew.py

      - name: 清理旧运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
