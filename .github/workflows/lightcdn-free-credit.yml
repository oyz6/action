# .github/workflows/lightcdn-free-credit.yml
name: LightCDN 自动领取免费额度

on:
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 8:00 (北京时间 16:00)
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  claim-credit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .  # 拉到根目录

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual        # IPv4+IPv6
          mode: client       # 客户端模式

      - name: 验证 WARP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org
          echo
          echo "🔍 Cloudflare Trace:"
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright aiohttp
          playwright install chromium
          playwright install-deps chromium

      - name: 运行 LightCDN 领取脚本
        env:
          # 账号变量，格式: 邮箱-----密码
          LIGHTCDN_1: ${{ secrets.LIGHTCDN_1 }}
          LIGHTCDN_2: ${{ secrets.LIGHTCDN_2 }}
          LIGHTCDN_3: ${{ secrets.LIGHTCDN_3 }}
          LIGHTCDN_4: ${{ secrets.LIGHTCDN_4 }}
          LIGHTCDN_5: ${{ secrets.LIGHTCDN_5 }}
          # Telegram 通知
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/lightcdn/claim_free_credit.py

      - name: 上传失败截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 3

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
