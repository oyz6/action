name: VPS8 签到 NopeCHA

on:
  workflow_dispatch:

jobs:
  sign:
    name: 执行签到
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb fonts-noto-cjk fonts-wqy-zenhei p7zip-full

      - name: 安装 Playwright 及 Python 库
        run: |
          pip install -q playwright requests
          playwright install chromium

      - name: 下载并解压扩展
        run: |
          mkdir -p scripts/extensions/nopecha scripts/extensions/buster

          wget -q -O scripts/extensions/nopecha/chromium.zip \
            https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
          7z x -y scripts/extensions/nopecha/chromium.zip -oscripts/extensions/nopecha/unpacked

          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          7z x -y scripts/extensions/buster/buster.zip -oscripts/extensions/buster/unpacked

      - name: 配置 HY2 代理
        env:
          HY2_URL: ${{ secrets.HY2_URL_US }}
        run: |
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$HY2_URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")

          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:1080
          EOF

          ./hysteria client -c hy2.yaml > hy2.log 2>&1 &
          sleep 5

          PROXY="http://127.0.0.1:1080"
          if curl -x "$PROXY" -s --max-time 20 https://api.ipify.org > /dev/null; then
            echo "✅ HY2 连接成功"
            echo "PROXY_HTTP=$PROXY" >> $GITHUB_ENV
          else
            echo "❌ HY2 代理不可用"
            cat hy2.log
            exit 1
          fi

      - name: 恢复登录状态
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: pw_profiles/auth_state.json
          key: VPS8-auth-${{ github.run_id }}
          restore-keys: |
            VPS8-auth-

      - name: 执行 VPS8 签到
        env:
          VPS8: ${{ secrets.VPS8 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NOPECHA_KEY: ${{ secrets.NOPECHA_KEY }}
          PROXY_HTTP: ${{ env.PROXY_HTTP }}
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" python -u scripts/VPS8/main_NopeCHA.py

      - name: 保存登录状态
        if: always()
        uses: actions/cache/save@v4
        with:
          path: pw_profiles/auth_state.json
          key: VPS8-auth-${{ github.run_id }}
        continue-on-error: true

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
