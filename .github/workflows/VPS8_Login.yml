name: VPS8 每日签到

on:
#  schedule:
#    - cron: '35 3 * * *'  # 每天北京时间 11:35 运行
  workflow_dispatch:

jobs:
  sign:
    name: 执行签到
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write

    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb google-chrome-stable fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei

      - name: 安装 Python 依赖
        run: |
          pip install -q seleniumbase pyvirtualdisplay requests

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL_PL }}
        run: |
          if [ -z "$HY2_URL" ]; then
            echo "INFO: 无代理配置，使用直连模式"
            exit 0
          fi

          echo "INFO: 配置 Hysteria2 代理"
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")

          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:1080
          EOF

          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3
          echo "PROXY_SERVER=http://127.0.0.1:1080" >> $GITHUB_ENV
          echo "INFO: 代理已启动"

      - name: 执行 VPS8 签到
        env:
          VPS8: ${{ secrets.VPS8 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/VPS8/main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
