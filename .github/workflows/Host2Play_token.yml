name: Host2Play 续期 (cache)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name:  Hash 破解模块
        id: cache-captcha-solver
        uses: actions/cache@v4
        with:
          path: captcha_solver
          key: captcha-solver-chromium-latest-v1

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb unzip curl
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: pip install DrissionPage xvfbwrapper requests

      - name: 执行续期
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/Host2Play/renew.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理旧运行
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
