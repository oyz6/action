name: Billing Kerit 自动重启密码登录版

on:
#  schedule:
#    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      account_name:
        description: '指定账号（留空运行全部）'
        required: false
        default: ''

env:
  TZ: Asia/Shanghai

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .  # 拉到根目录

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 安装 Python 依赖
        run: |
          pip install playwright aiohttp requests SpeechRecognition pydub
          playwright install chromium
          playwright install-deps chromium

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3

      - name: 运行脚本
        env:
          BILLING_KERIT_ACCOUNTS: ${{ secrets.BILLING_KERIT_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: http://127.0.0.1:7890
          ACCOUNT_NAME: ${{ github.event.inputs.account_name }}
        run: python scripts/BillingKerit/Billing-Kerit_Restart.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/
          retention-days: 7
          if-no-files-found: ignore
