name: Billing Kerit 重启帐号版

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: '指定账号邮箱（留空运行全部）'
        required: false
        default: ''
        type: string

concurrency:
  group: Billing_Kerit_Restart
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  restart:
    name: 重启服务器
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          pip install -q playwright aiohttp requests SpeechRecognition pydub
          playwright install chromium
          playwright install-deps

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          wget -q https://github.com/apernet/hysteria/releases/latest/download/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3

      - name: 执行重启脚本
        env:
          BILLING_KERIT_ACCOUNTS: ${{ secrets.BILLING_KERIT_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACCOUNT_NAME: ${{ github.event.inputs.account_name }}
        run: |
          python scripts/BillingKerit/Billing-Kerit_Restart.py

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
