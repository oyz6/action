name: Billing Kerit 重启帐号版

on:
  workflow_dispatch:
    inputs:
      account_name:
        description: '指定账号邮箱（留空运行全部）'
        required: false
        default: ''
        type: string

concurrency:
  group: Billing_Kerit_Restart
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  restart:
    name: 重启服务器
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install playwright aiohttp pynacl requests SpeechRecognition pydub
          playwright install chromium

      - name: 执行重启脚本
        env:
          BILLING_KERIT_ACCOUNTS: ${{ secrets.BILLING_KERIT_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ACCOUNT_NAME: ${{ github.event.inputs.account_name }}
        run: |
          python scripts/BillingKerit/BillingKerit_Restart.py

      - name: 清理工作流记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
