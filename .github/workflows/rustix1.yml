name: Rustix 保活

on:
#  schedule:
#    - cron: '*/30 * * * *'  # 每30分钟执行一次
  workflow_dispatch:          # 支持手动触发

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python 依赖
        run: |
          pip install requests playwright "requests[socks]"
          playwright install chromium
          playwright install-deps chromium

      - name: 配置代理
        env:
          NODE_LINK: ${{ secrets.PROXY_NODE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "❌ 代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ Rustix 保活失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 执行保活
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          python scripts/Rustix/rustix1.py

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
