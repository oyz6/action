name: TeoHeberg 续期3

on:
  workflow_dispatch:
  schedule:
    - cron: '28 0 * * *'  # 北京时间 08:28

jobs:
  run:
    name: 执行续期
    runs-on: ubuntu-22.04
    timeout-minutes: 30  # 可酌情调整

    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖与 Python 包
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg mesa-utils \
            libgl1-mesa-glx libgl1-mesa-dri \
            wireguard wireguard-tools curl jq

          pip install --quiet playwright requests SpeechRecognition pydub PyNaCl
          python -m playwright install --with-deps chromium

      - name: 安装并启动 WARP
        run: |
          set -euo pipefail

          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
              -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg

          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ focal main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          sudo apt-get update -qq
          sudo apt-get install -y -qq cloudflare-warp

          sudo systemctl start warp-svc
          sleep 2

          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp
          sudo warp-cli --accept-tos connect

          for i in {1..20}; do
            status=$(sudo warp-cli --accept-tos status 2>/dev/null \
              | grep -oP 'Status: \K\w+' || echo unknown)
            if [[ "$status" == "Connected" ]]; then
              echo "✅ WARP 已连接 (${i}s)"
              break
            fi
            echo "等待 WARP... ${i}s (status=$status)"
            sleep 1
          done

      - name: 配置 DNS
        run: |
          set -euo pipefail
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" \
            | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true

          echo -n "出口 IP: "
          curl -s --max-time 5 https://api.ipify.org || echo "获取失败"
          echo ""
          warp_status=$(curl -s --max-time 5 \
            https://www.cloudflare.com/cdn-cgi/trace \
            | grep -oP 'warp=\K\w+' || echo unknown)
          echo "WARP 状态: $warp_status"

      - name: 执行续期脚本
        env:
          TEOHEBERG: ${{ secrets.TEOHEBERG_3 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python scripts/TeoHeberg/main2.py

      - name: 清理旧工作流运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
