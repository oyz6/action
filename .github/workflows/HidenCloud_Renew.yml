name: HidenCloud 续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 初始占位，运行后自动更新

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --quiet seleniumbase requests

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE_US }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi
          
          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray
          
          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          # 解析协议
          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              # 直接使用外部 SOCKS5
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          # 去除备注
          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 1080, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 1081, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              # vless://uuid@server:port?params
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              
              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              
              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")
              
              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }
              
              # 添加 flow
              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow
              
              # Reality 设置
              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk
                  }
              # TLS 设置
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }
              
              # WebSocket 设置
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              # gRPC 设置
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": service_name
                  }
              
              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              # vmess://base64
              try:
                  # 处理 URL 安全的 base64
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)
              
              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")
              
              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")
              
              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }
              
              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }
              
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              
              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              # trojan://password@server:port?params
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""
              
              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"
              
              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]
              
              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")
              
              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls",
                      "tlsSettings": {
                          "serverName": sni,
                          "fingerprint": fp,
                          "allowInsecure": False
                      }
                  }
              }
              
              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              
              config["outbounds"].append(outbound)

          elif protocol == "ss":
              # ss://base64@server:port 或 ss://base64#name
              try:
                  if "@" in content:
                      # 新格式: base64(method:password)@server:port
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      # 旧格式: base64(method:password@server:port)
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)
              
              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")
              
              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "method": method,
                          "password": password
                      }]
                  }
              }
              
              config["outbounds"].append(outbound)

          # 保存配置
          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)
          
          print("[INFO] ✅ 代理配置已生成")
          PYEOF
          
          # 检查是否使用外部 SOCKS5
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi
          
          # 启动 Xray
          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5
          
          # 测试代理
          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done
          
          echo "[ERROR] ❌ 代理连接失败"
          echo "--- Xray 日志 ---"
          cat xray.log
          exit 1

      - name: 恢复浏览器状态缓存
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ./browser_state
          key: hidencloud-state-${{ github.run_id }}
          restore-keys: |
            hidencloud-state-

      - name: 运行续期脚本
        id: run_renew
        env:
          HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          python scripts/HidenCloud/main.py 2>&1 | tee renew.log

      - name: 上传日志和截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hidencloud-logs
          path: |
            screenshots/*.png
            renew.log
          retention-days: 3
          
      - name: 保存浏览器状态缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./browser_state
          key: hidencloud-state-${{ github.run_id }}

      - name: 提取到期时间
        id: extract_due
        if: success()
        run: |
          DUE_DATE=$(grep -oP '到期时间: \K\d{4}-\d{2}-\d{2}' renew.log | tail -1 || echo "")
          if [ -z "$DUE_DATE" ]; then
            echo "skip_update=true" >> $GITHUB_OUTPUT
            echo "::warning::未能提取到期时间，跳过 Cron 更新"
            exit 0
          fi
          echo "due_date=$DUE_DATE" >> $GITHUB_OUTPUT
          echo "skip_update=false" >> $GITHUB_OUTPUT
          echo "::notice::📅 当前到期时间: $DUE_DATE"

      - name: 修改下次 Cron 时间
        if: success() && steps.extract_due.outputs.skip_update != 'true'
        run: |
          DUE_DATE="${{ steps.extract_due.outputs.due_date }}"
          # 计算到期前2天的日期
          RUN_DATE=$(date -u -d "$DUE_DATE -2 days" +"%Y-%m-%d")
          RUN_DAY=$(date -u -d "$RUN_DATE" +"%-d")
          RUN_MONTH=$(date -u -d "$RUN_DATE" +"%-m")
          # 固定UTC时间 00:00
          NEW_CRON="0 0 $RUN_DAY $RUN_MONTH *"
          
          echo "::notice::⏰ 新 Cron: $NEW_CRON (运行于 $RUN_DATE 00:00 UTC)"
          
          # 检出工作流仓库
          git clone https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git workflow_repo
          cd workflow_repo
          
          WORKFLOW_FILE=".github/workflows/HidenCloud_Renew.yml"
          sed -i "s|cron: '.*'|cron: '$NEW_CRON'|g" "$WORKFLOW_FILE"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"
          git commit -m "🔄 自动更新 HidenCloud 续期 Cron" || echo "无变化"
          git push

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
