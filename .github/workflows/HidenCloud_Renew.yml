name: HidenCloud 续期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # 初始占位，运行后自动更新

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: scripts_repo

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install --quiet camoufox playwright
          playwright install chromium
          playwright install-deps chromium

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE_US }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi
          
          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray
          
          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          if url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议：{url.split('://')[0]}")
              sys.exit(1)
          PYEOF
          
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SERVER=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi
          
          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5
          
          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done
          
          echo "[ERROR] ❌ 代理连接失败"
          cat xray.log
          exit 1

      - name: 恢复浏览器状态缓存
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ./browser_state
          key: hidencloud-state-${{ github.run_id }}
          restore-keys: |
            hidencloud-state-

      - name: 运行续期脚本
        id: run_renew
        env:
          HIDENCLOUD: ${{ secrets.HIDENCLOUD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: |
          cd scripts_repo
          xvfb-run -a -s "-screen 0 1920x1080x24" python3 scripts/HidenCloud/main.py 2>&1 | tee renew.log

      - name: 上传日志和截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hidencloud-logs
          path: |
            scripts_repo/screenshots/*.png
            scripts_repo/renew.log
          retention-days: 3

      - name: 保存浏览器状态缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ./browser_state
          key: hidencloud-state-${{ github.run_id }}

      - name: 提取到期时间
        id: extract_due
        if: success()
        working-directory: scripts_repo
        run: |
          DUE_DATE=$(grep -oP '到期时间：\K\d{4}-\d{2}-\d{2}' renew.log | tail -1 || echo "")
          if [ -z "$DUE_DATE" ]; then
            echo "skip_update=true" >> $GITHUB_OUTPUT
            echo "::warning::未能提取到期时间，跳过 Cron 更新"
            exit 0
          fi
          echo "due_date=$DUE_DATE" >> $GITHUB_OUTPUT
          echo "skip_update=false" >> $GITHUB_OUTPUT
          echo "::notice::📅 当前到期时间：$DUE_DATE"
