name: FreezeHost 自动续期-2

on:
  schedule:
    - cron: '0 1 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_1 - 下一次: 自动计算
    - cron: '0 2 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_2 - 下一次: 自动计算
    - cron: '0 3 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_3 - 下一次: 自动计算
    - cron: '0 4 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_4 - 下一次: 自动计算
    - cron: '0 5 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_5 - 下一次: 自动计算
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - name: 确定使用哪个 Token
        id: select_token
        run: |
          HOUR=$(date -u +%H)
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            case $HOUR in
              01) TOKEN_NUM=1 ;;
              02) TOKEN_NUM=2 ;;
              03) TOKEN_NUM=3 ;;
              04) TOKEN_NUM=4 ;;
              05) TOKEN_NUM=5 ;;
              *) TOKEN_NUM=1 ;;
            esac
          fi
          
          echo "token_number=$TOKEN_NUM" >> $GITHUB_OUTPUT
          echo "::notice::选择 Token 编号: $TOKEN_NUM"

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."

          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup free.freezehost.pro 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 设置 Discord Token
        id: set_token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"
          
          case $TOKEN_NUM in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> $GITHUB_ENV ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> $GITHUB_ENV ;;
            3) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_3 }}" >> $GITHUB_ENV ;;
            4) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_4 }}" >> $GITHUB_ENV ;;
            5) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_5 }}" >> $GITHUB_ENV ;;
            *) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> $GITHUB_ENV ;;
          esac
          
          echo "::notice::已设置 Token 编号: $TOKEN_NUM"

      - name: 运行续期脚本
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "使用 Token 编号: ${{ steps.select_token.outputs.token_number }}"
          python scripts/FreezeHost/renew.py

      - name: 计算下次运行时间
        id: calc_next_run
        if: success()
        run: |
          # 从脚本输出中提取剩余天数
          if [ -f "renew_result.json" ]; then
            REMAINING_DAYS=$(jq -r '.remaining_days // 0' renew_result.json)
          else
            # 默认值，如果没有输出文件
            REMAINING_DAYS=11
          fi
          
          echo "剩余天数: $REMAINING_DAYS"
          
          # 计算下次运行时间 (到期前2天)
          if [ "$REMAINING_DAYS" -gt 2 ]; then
            DAYS_UNTIL_NEXT_RUN=$((REMAINING_DAYS - 2))
          else
            DAYS_UNTIL_NEXT_RUN=1
          fi
          
          # 计算目标日期
          NEXT_RUN_DATE=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%Y-%m-%d %H:%M")
          NEXT_RUN_YEAR=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%Y")
          NEXT_RUN_MONTH=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%-m")
          NEXT_RUN_DAY=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%-d")
          NEXT_RUN_HOUR=$(date -u +"%H")
          NEXT_RUN_MINUTE=$(date -u +"%M")
          
          # 生成新的 cron 表达式
          NEW_CRON="$NEXT_RUN_MINUTE $NEXT_RUN_HOUR $NEXT_RUN_DAY $NEXT_RUN_MONTH *"
          
          echo "next_cron=$NEW_CRON" >> $GITHUB_OUTPUT
          echo "next_run_date=$NEXT_RUN_DATE" >> $GITHUB_OUTPUT
          echo "token_num=${{ steps.select_token.outputs.token_number }}" >> $GITHUB_OUTPUT
          
          echo "::notice::Token ${{ steps.select_token.outputs.token_number }} 下次运行: $NEXT_RUN_DATE UTC"
          echo "::notice::新 Cron 表达式: $NEW_CRON"

      - name: 更新 Workflow Cron
        if: success() && steps.calc_next_run.outputs.next_cron != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          TOKEN_NUM="${{ steps.calc_next_run.outputs.token_num }}"
          NEW_CRON="${{ steps.calc_next_run.outputs.next_cron }}"
          NEXT_DATE="${{ steps.calc_next_run.outputs.next_run_date }}"

          cd workflow_repo

          echo "::notice::github.workflow      = ${{ github.workflow }}"
          echo "::notice::github.workflow_ref  = ${{ github.workflow_ref }}"

          # 直接从 workflow_ref 提取当前 workflow 文件路径
          WORKFLOW_FILE=$(echo "${{ github.workflow_ref }}" | sed -E 's|^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*|\1|')

          if [ ! -f "$WORKFLOW_FILE" ]; then
            echo "::error::当前 workflow 文件不存在: $WORKFLOW_FILE"
            echo "::group::.github/workflows 列表"
            find .github/workflows -type f
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice::当前 workflow 文件: $WORKFLOW_FILE"

          TARGET_PATTERN="FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM"
          NEW_LINE="    - cron: '$NEW_CRON'   # FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM - 下一次: $NEXT_DATE UTC"

          LINE_NUM=$(grep -n "$TARGET_PATTERN" "$WORKFLOW_FILE" | cut -d: -f1 | head -n1 || true)

          if [ -z "$LINE_NUM" ]; then
            echo "::error::找不到 $TARGET_PATTERN 对应行"
            echo "::group::文件内容"
            nl -ba "$WORKFLOW_FILE"
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice::更新第 $LINE_NUM 行"

          echo "::group::原始行"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          sed -i "${LINE_NUM}c\\
          $NEW_LINE
          " "$WORKFLOW_FILE"

          echo "::group::修改后"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"

          if git diff --staged --quiet; then
            echo "::notice::没有变化需要提交"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          git commit \
            -m "🤖 自动更新 Token $TOKEN_NUM 下次运行时间" \
            -m "Token: FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM" \
            -m "下次运行: $NEXT_DATE UTC" \
            -m "Cron: $NEW_CRON" \
            -m "自动生成: $TIMESTAMP"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git push

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: renew-screenshots-token-${{ steps.select_token.outputs.token_number }}
#          path: screenshots/
#          retention-days: 7

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
