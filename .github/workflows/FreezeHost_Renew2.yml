name: FreezeHost 续期多账号版  # REPO_TOKEN 权限要求 repo + workflow

on:
  schedule:
    - cron: '45 1 20 6 *'   # FREEZEHOST_DISCORD_TOKEN_1 - 下一次: 2026-06-20 05:45 UTC
    - cron: '31 2 17 5 *'   # FREEZEHOST_DISCORD_TOKEN_2 - 下一次: 2026-05-17 04:31 UTC
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 确定使用哪个 Token
        id: select_token
        run: |
          HOUR=$(date -u +%H)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            case "$HOUR" in
              01) TOKEN_NUM=1 ;;
              02) TOKEN_NUM=2 ;;
              *) TOKEN_NUM=1 ;;
            esac
          fi

          echo "token_number=$TOKEN_NUM" >> "$GITHUB_OUTPUT"
          echo "::notice::选择 Token 编号: $TOKEN_NUM"

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright playwright-stealth
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: 安装并启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE_ISP }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          wget -q https://github.com/oyz6/action/releases/download/proxy/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray && chmod +x xray/xray

          python3 << 'PYEOF'
          import os, sys, json, base64
          from urllib.parse import parse_qs, unquote, urlparse

          def mask(s):
              return f"{s[:2]}***{s[-2:]}" if len(s) > 4 else "****"

          url = os.environ.get("PROXY_NODE", "").strip()
          if not url:
              print("[ERROR] PROXY_NODE 为空")
              sys.exit(1)

          # 解析协议
          if url.startswith("vless://"):
              protocol = "vless"
              content = url[8:]
          elif url.startswith("vmess://"):
              protocol = "vmess"
              content = url[8:]
          elif url.startswith("trojan://"):
              protocol = "trojan"
              content = url[9:]
          elif url.startswith("ss://"):
              protocol = "ss"
              content = url[5:]
          elif url.startswith("socks5://") or url.startswith("socks://"):
              protocol = "socks5"
              content = url.split("://")[1].split("#")[0]
              if "@" in content:
                  server = content.split("@")[1].split(":")[0]
              else:
                  server = content.split(":")[0]
              print(f"[INFO] SOCKS5 -> {mask(server)}")
              with open("use_external_socks.txt", "w") as f:
                  f.write(url.split("#")[0])
              sys.exit(0)
          else:
              print(f"[ERROR] 不支持的协议: {url.split('://')[0]}")
              sys.exit(1)

          # 去除备注
          if "#" in content:
              content = content.rsplit("#", 1)[0]

          config = {
              "log": {"loglevel": "warning"},
              "inbounds": [
                  {"port": 10808, "listen": "127.0.0.1", "protocol": "socks", "settings": {"udp": True}},
                  {"port": 10809, "listen": "127.0.0.1", "protocol": "http"}
              ],
              "outbounds": []
          }

          if protocol == "vless":
              uuid, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              security = params.get("security", ["none"])[0]
              network = params.get("type", ["tcp"])[0]
              sni = params.get("sni", [address])[0]
              fp = params.get("fp", ["chrome"])[0]
              flow = params.get("flow", [""])[0]
              pbk = params.get("pbk", [""])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              sid = params.get("sid", [""])[0]

              print(f"[INFO] VLESS -> {mask(address)}:{port} (security: {security}, network: {network})")

              outbound = {
                  "protocol": "vless",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": int(port),
                          "users": [{"id": uuid, "encryption": "none"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": security
                  }
              }

              if flow:
                  outbound["settings"]["vnext"][0]["users"][0]["flow"] = flow

              if security == "reality":
                  outbound["streamSettings"]["realitySettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "publicKey": pbk,
                      "shortId": sid
                  }
              elif security == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }
              elif network == "grpc":
                  service_name = params.get("serviceName", [""])[0]
                  outbound["streamSettings"]["grpcSettings"] = {
                      "serviceName": service_name
                  }

              config["outbounds"].append(outbound)

          elif protocol == "vmess":
              try:
                  padding = 4 - len(content) % 4
                  if padding != 4:
                      content += "=" * padding
                  decoded = base64.b64decode(content).decode("utf-8")
                  vm = json.loads(decoded)
              except Exception as e:
                  print(f"[ERROR] VMess 解析失败: {e}")
                  sys.exit(1)

              address = vm.get("add", "")
              port = int(vm.get("port", 443))
              uuid = vm.get("id", "")
              aid = int(vm.get("aid", 0))
              network = vm.get("net", "tcp")
              tls = vm.get("tls", "")
              sni = vm.get("sni", "") or vm.get("host", address)
              host = vm.get("host", address)
              path = vm.get("path", "/")
              fp = vm.get("fp", "chrome")

              print(f"[INFO] VMess -> {mask(address)}:{port} (network: {network}, tls: {tls})")

              outbound = {
                  "protocol": "vmess",
                  "settings": {
                      "vnext": [{
                          "address": address,
                          "port": port,
                          "users": [{"id": uuid, "alterId": aid, "security": "auto"}]
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls" if tls == "tls" else "none"
                  }
              }

              if tls == "tls":
                  outbound["streamSettings"]["tlsSettings"] = {
                      "serverName": sni,
                      "fingerprint": fp,
                      "allowInsecure": False
                  }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "trojan":
              password, rest = content.split("@", 1)
              if "?" in rest:
                  host_port, params_str = rest.split("?", 1)
              else:
                  host_port, params_str = rest, ""

              if ":" in host_port:
                  address, port = host_port.rsplit(":", 1)
              else:
                  address, port = host_port, "443"

              params = parse_qs(params_str)
              sni = params.get("sni", [address])[0]
              network = params.get("type", ["tcp"])[0]
              host = params.get("host", [sni])[0]
              path = unquote(params.get("path", ["/"])[0])
              fp = params.get("fp", ["chrome"])[0]

              print(f"[INFO] Trojan -> {mask(address)}:{port} (network: {network})")

              outbound = {
                  "protocol": "trojan",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "password": password
                      }]
                  },
                  "streamSettings": {
                      "network": network,
                      "security": "tls",
                      "tlsSettings": {
                          "serverName": sni,
                          "fingerprint": fp,
                          "allowInsecure": False
                      }
                  }
              }

              if network == "ws":
                  outbound["streamSettings"]["wsSettings"] = {
                      "path": path,
                      "headers": {"Host": host}
                  }

              config["outbounds"].append(outbound)

          elif protocol == "ss":
              try:
                  if "@" in content:
                      encoded, server_part = content.split("@", 1)
                      decoded = base64.b64decode(encoded + "==").decode("utf-8")
                      method, password = decoded.split(":", 1)
                      address, port = server_part.split(":", 1)
                  else:
                      decoded = base64.b64decode(content + "==").decode("utf-8")
                      if "@" in decoded:
                          user_part, server_part = decoded.split("@", 1)
                          method, password = user_part.split(":", 1)
                          address, port = server_part.split(":", 1)
                      else:
                          raise ValueError("无法解析")
              except Exception as e:
                  print(f"[ERROR] Shadowsocks 解析失败: {e}")
                  sys.exit(1)

              print(f"[INFO] Shadowsocks -> {mask(address)}:{port}")

              outbound = {
                  "protocol": "shadowsocks",
                  "settings": {
                      "servers": [{
                          "address": address,
                          "port": int(port),
                          "method": method,
                          "password": password
                      }]
                  }
              }

              config["outbounds"].append(outbound)

          # 保存配置
          with open("xray_config.json", "w") as f:
              json.dump(config, f, indent=2)

          print("[INFO] ✅ 代理配置已生成")
          PYEOF

          # 检查是否使用外部 SOCKS5
          if [ -f "use_external_socks.txt" ]; then
            EXTERNAL_SOCKS=$(cat use_external_socks.txt)
            echo "PROXY_SOCKS5=$EXTERNAL_SOCKS" >> $GITHUB_ENV
            echo "[INFO] ✅ 使用外部 SOCKS5 代理"
            exit 0
          fi

          # 启动 Xray
          ./xray/xray run -c xray_config.json > xray.log 2>&1 &
          sleep 5

          # 测试代理
          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            if curl -x socks5://127.0.0.1:10808 -s --max-time 15 https://api.ipify.org > /dev/null 2>&1; then
              echo "[INFO] ✅ 代理连接成功"
              echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          echo "--- Xray 日志 ---"
          cat xray.log
          exit 1

      - name: 设置 Discord Token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"

          case "$TOKEN_NUM" in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> "$GITHUB_ENV" ;;
            *) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
          esac

          echo "::notice::已设置 Token 编号: $TOKEN_NUM"

      - name: 运行续期脚本
        id: run_renew
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
        run: |
          echo "使用 Token 编号: ${{ steps.select_token.outputs.token_number }}"
          python scripts/FreezeHost/renew.py 2>&1 | tee renew.log

      - name: 提取剩余天数（取所有服务器的最小值）
        id: extract_days
        if: success()
        run: |
          set -e
          
          MIN_DAYS=""
          
          if [ -f "renew_result.json" ]; then
            MIN_DAYS=$(jq -r '.min_remaining_days // empty' renew_result.json)
            if [ -n "$MIN_DAYS" ]; then
              echo "✅ 从 renew_result.json 读取最小剩余天数: $MIN_DAYS"
            fi
          fi
          
          if [ -z "$MIN_DAYS" ] && [ -f "renew.log" ]; then
            echo "📋 从 renew.log 提取所有服务器剩余天数："
            
            MIN_DAYS=""
            while IFS= read -r line; do
              DAYS=$(echo "$line" | grep -oP '\d+(?=\s*DAYS?)' || echo "0")
              HOURS=$(echo "$line" | grep -oP '\d+\.?\d*(?=\s*HOURS?)' || echo "0")
              
              if [ "$DAYS" != "0" ] || [ "$HOURS" != "0" ]; then
                TOTAL=$(echo "scale=6; $DAYS + ($HOURS / 24)" | bc)
                echo "  - $DAYS 天 + $HOURS 小时 = $TOTAL 天"
                
                if [ -z "$MIN_DAYS" ] || (( $(echo "$TOTAL < $MIN_DAYS" | bc -l) )); then
                  MIN_DAYS="$TOTAL"
                fi
              fi
            done < <(grep -E "续期状态: .* DAYS? AND .* HOURS? REMAINING" renew.log || true)
            
            if [ -n "$MIN_DAYS" ]; then
              echo "✅ 最小剩余天数: $MIN_DAYS"
            fi
          fi
          
          if [ -z "$MIN_DAYS" ] || [ "$MIN_DAYS" = "0" ]; then
            echo "::warning::未找到有效的剩余时间，跳过 workflow 更新"
            echo "skip_update=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "remaining_days=$MIN_DAYS" >> "$GITHUB_OUTPUT"
          echo "skip_update=false" >> "$GITHUB_OUTPUT"
          echo "::notice::剩余天数（最小值）: $MIN_DAYS"
          
          mkdir -p /tmp/renew_data
          echo "$MIN_DAYS" > /tmp/renew_data/remaining_days.txt

      - name: 拉取公开仓库
        if: success() && steps.extract_days.outputs.skip_update != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow_repo
          fetch-depth: 1

      - name: 修改 Cron 时间
        if: success() && steps.extract_days.outputs.skip_update != 'true'
        run: |
          set -e

          REMAINING_DAYS="${{ steps.extract_days.outputs.remaining_days }}"
          
          if [ -z "$REMAINING_DAYS" ] && [ -f "/tmp/renew_data/remaining_days.txt" ]; then
            REMAINING_DAYS=$(cat /tmp/renew_data/remaining_days.txt)
          fi
          
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"

          echo "剩余天数: $REMAINING_DAYS"
          echo "Token 编号: $TOKEN_NUM"

          if (( $(echo "$REMAINING_DAYS > 2" | bc -l) )); then
            DAYS_UNTIL_NEXT_RUN=$(echo "$REMAINING_DAYS - 2" | bc)
          else
            DAYS_UNTIL_NEXT_RUN=0.5
            echo "::warning::剩余时间不足 2 天，12 小时后重试"
          fi

          DAYS_INT=$(printf "%.0f" "$DAYS_UNTIL_NEXT_RUN")
          NEXT_DATE=$(date -u -d "+${DAYS_INT} days" +"%Y-%m-%d %H:%M")
          NEXT_DAY=$(date -u -d "+${DAYS_INT} days" +"%-d")
          NEXT_MONTH=$(date -u -d "+${DAYS_INT} days" +"%-m")
          
          case "$TOKEN_NUM" in
            1) NEXT_HOUR=1 ;;
            2) NEXT_HOUR=2 ;;
            *) NEXT_HOUR=$(date -u +"%H") ;;
          esac
          
          NEXT_MINUTE=$(date -u +"%M")

          NEW_CRON="$NEXT_MINUTE $NEXT_HOUR $NEXT_DAY $NEXT_MONTH *"

          echo "::notice::📅 下次运行: $NEXT_DATE UTC"
          echo "::notice::⏰ 新 Cron: $NEW_CRON"

          cd workflow_repo

          WORKFLOW_FILE=$(echo "${{ github.workflow_ref }}" | sed -E 's|^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*|\1|')

          echo "::notice::📄 当前 workflow 文件: $WORKFLOW_FILE"

          if [ ! -f "$WORKFLOW_FILE" ]; then
            echo "::error::文件不存在: $WORKFLOW_FILE"
            echo "::group::.github/workflows 目录内容"
            ls -la .github/workflows/
            echo "::endgroup::"
            exit 1
          fi

          TARGET_PATTERN="FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM"
          LINE_NUM=$(grep -n "$TARGET_PATTERN" "$WORKFLOW_FILE" | cut -d: -f1 | head -n1)

          if [ -z "$LINE_NUM" ]; then
            echo "::error::找不到 $TARGET_PATTERN 对应行"
            echo "::group::文件内容"
            nl -ba "$WORKFLOW_FILE"
            echo "::endgroup::"
            exit 1
          fi

          echo "::notice::更新第 $LINE_NUM 行"

          echo "::group::原始行"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          sed -i "${LINE_NUM}c\\    - cron: '$NEW_CRON'   # FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM - 下一次: $NEXT_DATE UTC" "$WORKFLOW_FILE"

          echo "::group::修改后"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"

          if git diff --quiet "$WORKFLOW_FILE"; then
            echo "::notice::没有变化需要提交"
            exit 0
          fi

          echo "::group::完整修改内容"
          git diff "$WORKFLOW_FILE"
          echo "::endgroup::"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"
          
          git commit -m "自动调整 FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM 下次续期时间" \
                     -m "下次运行: $NEXT_DATE UTC" \
                     -m "Cron: $NEW_CRON" \
                     -m "剩余天数（最小值）: $REMAINING_DAYS"
          
          git remote set-url origin "https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ github.repository }}.git"
          git push

          echo "::notice::✅ 成功更新 workflow 文件"

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: renew-screenshots-token-${{ steps.select_token.outputs.token_number }}
#          path: screenshots/
#          retention-days: 7

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
