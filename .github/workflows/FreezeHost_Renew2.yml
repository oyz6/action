name: FreezeHost 自动续期-2

on:
  schedule:
    - cron: '0 1 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_1 - 下一次: 自动计算
    - cron: '0 2 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_2 - 下一次: 自动计算
    - cron: '0 3 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_3 - 下一次: 自动计算
    - cron: '0 4 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_4 - 下一次: 自动计算
    - cron: '0 5 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_5 - 下一次: 自动计算
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write

    steps:
      - name: 确定使用哪个 Token
        id: select_token
        run: |
          HOUR=$(date -u +%H)
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            case $HOUR in
              01) TOKEN_NUM=1 ;;
              02) TOKEN_NUM=2 ;;
              03) TOKEN_NUM=3 ;;
              04) TOKEN_NUM=4 ;;
              05) TOKEN_NUM=5 ;;
              *) TOKEN_NUM=1 ;;
            esac
          fi
          
          echo "token_number=$TOKEN_NUM" >> $GITHUB_OUTPUT
          echo "::notice::选择 Token 编号: $TOKEN_NUM"

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."

          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup free.freezehost.pro 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 设置 Discord Token
        id: set_token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"
          
          case $TOKEN_NUM in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> $GITHUB_ENV ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> $GITHUB_ENV ;;
            3) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_3 }}" >> $GITHUB_ENV ;;
            4) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_4 }}" >> $GITHUB_ENV ;;
            5) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_5 }}" >> $GITHUB_ENV ;;
            *) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> $GITHUB_ENV ;;
          esac
          
          echo "::notice::已设置 Token 编号: $TOKEN_NUM"

      - name: 运行续期脚本
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "使用 Token 编号: ${{ steps.select_token.outputs.token_number }}"
          python scripts/FreezeHost/renew.py

      - name: 计算下次运行时间
        id: calc_next_run
        if: success()
        run: |
          # 从脚本输出中提取剩余天数
          if [ -f "renew_result.json" ]; then
            REMAINING_DAYS=$(jq -r '.remaining_days // 0' renew_result.json)
          else
            # 默认值，如果没有输出文件
            REMAINING_DAYS=11
          fi
          
          echo "剩余天数: $REMAINING_DAYS"
          
          # 计算下次运行时间 (到期前2天)
          if [ "$REMAINING_DAYS" -gt 2 ]; then
            DAYS_UNTIL_NEXT_RUN=$((REMAINING_DAYS - 2))
          else
            DAYS_UNTIL_NEXT_RUN=1
          fi
          
          # 计算目标日期
          NEXT_RUN_DATE=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%Y-%m-%d %H:%M")
          NEXT_RUN_YEAR=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%Y")
          NEXT_RUN_MONTH=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%-m")
          NEXT_RUN_DAY=$(date -u -d "+${DAYS_UNTIL_NEXT_RUN} days" +"%-d")
          NEXT_RUN_HOUR=$(date -u +"%H")
          NEXT_RUN_MINUTE=$(date -u +"%M")
          
          # 生成新的 cron 表达式
          NEW_CRON="$NEXT_RUN_MINUTE $NEXT_RUN_HOUR $NEXT_RUN_DAY $NEXT_RUN_MONTH *"
          
          echo "next_cron=$NEW_CRON" >> $GITHUB_OUTPUT
          echo "next_run_date=$NEXT_RUN_DATE" >> $GITHUB_OUTPUT
          echo "token_num=${{ steps.select_token.outputs.token_number }}" >> $GITHUB_OUTPUT
          
          echo "::notice::Token ${{ steps.select_token.outputs.token_number }} 下次运行: $NEXT_RUN_DATE UTC"
          echo "::notice::新 Cron 表达式: $NEW_CRON"

      - name: 检出 Workflow 仓库
        if: success() && steps.calc_next_run.outputs.next_cron != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.REPO_TOKEN }}
          path: workflow_repo

      - name: 更新 Workflow Cron
        if: success() && steps.calc_next_run.outputs.next_cron != ''
        run: |
          TOKEN_NUM="${{ steps.calc_next_run.outputs.token_num }}"
          NEW_CRON="${{ steps.calc_next_run.outputs.next_cron }}"
          NEXT_DATE="${{ steps.calc_next_run.outputs.next_run_date }}"
          
          cd workflow_repo
          
          # 自动查找当前 workflow 文件
          WORKFLOW_NAME="${{ github.workflow }}"
          echo "::notice::查找 workflow: $WORKFLOW_NAME"
          
          # 方法1: 通过 workflow 名称查找
          WORKFLOW_FILE=$(find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \) | while read file; do
            if grep -q "name: $WORKFLOW_NAME" "$file"; then
              echo "$file"
              break
            fi
          done)
          
          # 方法2: 如果方法1失败，通过当前运行的 workflow 文件名查找
          if [ -z "$WORKFLOW_FILE" ]; then
            CURRENT_FILE="${{ github.workflow_ref }}"
            # 提取文件路径，格式如: owner/repo/.github/workflows/file.yml@ref
            WORKFLOW_FILE=$(echo "$CURRENT_FILE" | sed 's|.*/.github/workflows/\([^@]*\)@.*|.github/workflows/\1|')
          fi
          
          # 方法3: 如果还是找不到，列出所有 workflow 文件
          if [ ! -f "$WORKFLOW_FILE" ]; then
            echo "::warning::未能自动识别 workflow 文件，列出所有文件:"
            find .github/workflows -type f \( -name "*.yml" -o -name "*.yaml" \)
            
            # 尝试通过关键字查找（包含 FreezeHost 和 DISCORD_TOKEN）
            WORKFLOW_FILE=$(grep -l "FREEZEHOST_DISCORD_TOKEN" .github/workflows/*.{yml,yaml} 2>/dev/null | head -n1)
          fi
          
          if [ ! -f "$WORKFLOW_FILE" ]; then
            echo "::error::找不到 workflow 文件"
            echo "尝试的路径: $WORKFLOW_FILE"
            echo "当前目录内容:"
            ls -la .github/workflows/
            exit 1
          fi
          
          echo "::notice::找到 workflow 文件: $WORKFLOW_FILE"
          
          # 备份原文件
          cp "$WORKFLOW_FILE" "${WORKFLOW_FILE}.bak"
          
          # 查找对应 token 的 cron 行号
          echo "::notice::查找 Token $TOKEN_NUM 的 cron 配置..."
          
          # 使用更灵活的方式查找行号
          LINE_NUM=$(grep -n "FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM" "$WORKFLOW_FILE" | grep "cron:" | cut -d: -f1)
          
          if [ -z "$LINE_NUM" ]; then
            echo "::warning::未找到 Token $TOKEN_NUM 的 cron 配置，尝试按序号匹配..."
            # 按顺序获取第 N 个 cron 行
            LINE_NUM=$(grep -n "cron:" "$WORKFLOW_FILE" | sed -n "${TOKEN_NUM}p" | cut -d: -f1)
          fi
          
          if [ -z "$LINE_NUM" ]; then
            echo "::error::无法确定要更新的行号"
            exit 1
          fi
          
          echo "::notice::将更新第 $LINE_NUM 行"
          
          # 显示原始内容
          echo "::group::原始行内容"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"
          
          # 更新 cron 表达式和注释
          sed -i "${LINE_NUM}s|.*cron:.*|    - cron: '$NEW_CRON'   # FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM - 下一次: $NEXT_DATE UTC|" "$WORKFLOW_FILE"
          
          # 显示修改后的内容
          echo "::group::修改后的行内容"
          sed -n "${LINE_NUM}p" "$WORKFLOW_FILE"
          echo "::endgroup::"
          
          # 显示完整的 schedule 部分
          echo "::group::完整 schedule 配置"
          sed -n '/schedule:/,/workflow_dispatch:/p' "$WORKFLOW_FILE"
          echo "::endgroup::"
          
          # 提交更改
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_FILE"
          
          if git diff --staged --quiet; then
            echo "::notice::⚠️ 没有变化需要提交"
          else
            # 生成时间戳
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
            
            # 提交（使用 -m 多次指定多行）
            git commit \
              -m "🤖 自动更新 Token $TOKEN_NUM 下次运行时间" \
              -m "" \
              -m "- Token: FREEZEHOST_DISCORD_TOKEN_$TOKEN_NUM" \
              -m "- 下次运行: $NEXT_DATE UTC" \
              -m "- Cron: $NEW_CRON" \
              -m "- 自动生成于: $TIMESTAMP"
            
            # 推送
            if git push; then
              echo "::notice::✅ Workflow 已更新并推送"
            else
              echo "::error::❌ 推送失败"
              exit 1
            fi
          fi

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: renew-screenshots-token-${{ steps.select_token.outputs.token_number }}
#          path: screenshots/
#          retention-days: 7

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
