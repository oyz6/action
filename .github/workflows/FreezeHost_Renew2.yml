name: FreezeHost 自动续期-2

on:
  schedule:
    - cron: '0 1 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_1 - 下一次: 自动计算
    - cron: '0 2 */10 * *'   # FREEZEHOST_DISCORD_TOKEN_2 - 下一次: 自动计算
  workflow_dispatch:
    inputs:
      token_number:
        description: '选择 Token 编号'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'

jobs:
  renew:
    name: 执行续期
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write

    steps:
      - name: 确定使用哪个 Token
        id: select_token
        run: |
          HOUR=$(date -u +%H)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOKEN_NUM="${{ github.event.inputs.token_number }}"
          else
            case "$HOUR" in
              01) TOKEN_NUM=1 ;;
              02) TOKEN_NUM=2 ;;
              *) TOKEN_NUM=1 ;;
            esac
          fi

          echo "token_number=$TOKEN_NUM" >> "$GITHUB_OUTPUT"
          echo "::notice::选择 Token 编号: $TOKEN_NUM"

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y jq bc

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."

          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup free.freezehost.pro 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 设置 Discord Token
        run: |
          TOKEN_NUM="${{ steps.select_token.outputs.token_number }}"

          case "$TOKEN_NUM" in
            1) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
            2) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_2 }}" >> "$GITHUB_ENV" ;;
            *) echo "DISCORD_TOKEN=${{ secrets.FREEZEHOST_DISCORD_TOKEN_1 }}" >> "$GITHUB_ENV" ;;
          esac

          echo "::notice::已设置 Token 编号: $TOKEN_NUM"

      - name: 运行续期脚本
        id: run_renew
        env:
          FREEZEHOST_DISCORD_TOKEN: ${{ env.DISCORD_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "使用 Token 编号: ${{ steps.select_token.outputs.token_number }}"
          python scripts/FreezeHost/renew.py 2>&1 | tee renew.log

      - name: 修改下一次运行时间
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e

          # 提取剩余天数
          if [ -f "renew_result.json" ]; then
            REMAINING_DAYS=$(jq -r '.remaining_days // 11' renew_result.json)
          elif [ -f "next_time.txt" ]; then
            LINE=$(cat next_time.txt | tr '[:lower:]' '[:upper:]')
            DAYS=$(echo "$LINE" | grep -oP '\d+(?=\s*DAYS?)' || echo "0")
            HOURS=$(echo "$LINE" | grep -oP '\d+\.?\d*(?=\s*HOURS?)' || echo "0")
            REMAINING_DAYS=$(echo "scale=2; $DAYS + ($HOURS / 24)" | bc)
          else
            REMAINING_DAYS=11
            echo "::warning::未找到剩余时间文件，使用默认值 11 天"
          fi

          echo "剩余天数: $REMAINING_DAYS"

          # 计算下次运行时间
          if (( $(echo "$REMAINING_DAYS > 2" | bc -l) )); then
            DAYS_UNTIL_NEXT_RUN=$(echo "$REMAINING_DAYS - 2" | bc)
          else
            DAYS_UNTIL_NEXT_RUN=0.5
          fi

          DAYS_INT=$(printf "%.0f" "$DAYS_UNTIL_NEXT_RUN")
          NEXT_DATE=$(date -u -d "+${DAYS_INT} days" +"%Y-%m-%d %H:%M")
          NEXT_DAY=$(date -u -d "+${DAYS_INT} days" +"%-d")
          NEXT_MONTH=$(date -u -d "+${DAYS_INT} days" +"%-m")
          NEXT_HOUR=$(date -u +"%H")
          NEXT_MINUTE=$(date -u +"%M")

          NEW_CRON="$NEXT_MINUTE $NEXT_HOUR $NEXT_DAY $NEXT_MONTH *"

          echo "::notice::下次运行: $NEXT_DATE UTC"
          echo "::notice::新 Cron: $NEW_CRON"

          # 从 github.workflow_ref 提取当前 workflow 文件路径
          WORKFLOW_FILE=$(echo "${{ github.workflow_ref }}" | sed -E 's|^[^/]+/[^/]+/(\.github/workflows/[^@]+)@.*|\1|')

          echo "::notice::当前 workflow 文件: $WORKFLOW_FILE"

          # 通过 GitHub API 获取文件内容和 SHA
          API_URL="https://api.github.com/repos/${{ github.repository }}/contents/$WORKFLOW_FILE"
          
          RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$API_URL")
          
          FILE_SHA=$(echo "$RESPONSE" | jq -r '.sha')
          CONTENT_BASE64=$(echo "$RESPONSE" | jq -r '.content')

          if [ "$FILE_SHA" = "null" ] || [ -z "$FILE_SHA" ]; then
            echo "::error::无法获取文件 SHA"
            echo "$RESPONSE"
            exit 1
          fi

          echo "文件 SHA: $FILE_SHA"

          # 解码内容
          CURRENT_CONTENT=$(echo "$CONTENT_BASE64" | base64 -d)

          # 替换 cron 行（使用 sed）
          NEW_CONTENT=$(echo "$CURRENT_CONTENT" | sed -E "s|(- cron: ')[^']*'(.*#.*)|\1$NEW_CRON' # 下一个: $NEXT_DATE UTC (到期前2天自动执行)|")

          # 检查是否有变化
          if [ "$NEW_CONTENT" = "$CURRENT_CONTENT" ]; then
            echo "::notice::没有变化需要提交"
            exit 0
          fi

          # Base64 编码新内容
          NEW_CONTENT_BASE64=$(echo "$NEW_CONTENT" | base64 -w 0)

          # 通过 API 更新文件
          UPDATE_RESPONSE=$(curl -s -X PUT \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$API_URL" \
            -d @- << EOF
          {
            "message": "调整下次续期时间\n\n下次运行: $NEXT_DATE UTC\nCron: $NEW_CRON",
            "content": "$NEW_CONTENT_BASE64",
            "sha": "$FILE_SHA",
            "branch": "main"
          }
          EOF
          )

          # 检查结果
          COMMIT_SHA=$(echo "$UPDATE_RESPONSE" | jq -r '.commit.sha')

          if [ "$COMMIT_SHA" = "null" ] || [ -z "$COMMIT_SHA" ]; then
            echo "::error::更新失败"
            echo "$UPDATE_RESPONSE"
            exit 1
          fi

          echo "::notice::✅ 成功更新 workflow 文件"
          echo "::notice::Commit SHA: $COMMIT_SHA"

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
