name: Weirdhost 多账号自动续期

on:
#  schedule:
#    - cron: '20 3 * * *'
  workflow_dispatch:

jobs:
  add_time:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'
          cache-dependency-path: scripts/Weirdhost/requirements.txt

      - name: 缓存 apt 包
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: xvfb x11-utils xdotool scrot ffmpeg fonts-nanum fonts-noto-cjk
          version: 1.0

      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/Weirdhost/requirements.txt

      # ========== 步骤1: 续期（直连） ==========
      - name: 自动续期
        env:
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.WEIRDHOST_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RENEW_THRESHOLD_DAYS: "5"
          FREE_RENEW_THRESHOLD_DAYS: "2"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/Weirdhost/weirdhost_renew.py

      # ========== 步骤2: 检查是否有失败账号 ==========
      - name: 记录失败账号
        id: check_failed
        if: always()
        run: |
          if [ -f "scripts/Weirdhost/failed_accounts.json" ] && [ -s "scripts/Weirdhost/failed_accounts.json" ]; then
            count=$(python3 -c "import json; print(len(json.load(open('scripts/Weirdhost/failed_accounts.json'))))")
            echo "有 ${count} 个失败账号需要处理"
            echo "has_failed=true" >> $GITHUB_OUTPUT
          else
            echo "没有失败账号"
            echo "has_failed=false" >> $GITHUB_OUTPUT
          fi

      - name: 安装 Xray
        if: always() && steps.check_failed.outputs.has_failed == 'true'
        run: |
          echo "安装 Xray..."
          XRAY_VERSION="v25.1.30"
          if wget -q "https://github.com/XTLS/Xray-core/releases/download/${XRAY_VERSION}/Xray-linux-64.zip" -O /tmp/xray.zip; then
            echo "下载成功"
          else
            echo "官方下载失败，尝试备用链接..."
            wget -q "https://github.com/oyz6/action/releases/download/v25.1.30/Xray-linux-64.zip" -O /tmp/xray.zip || {
              echo "所有下载源均失败"
              exit 1
            }
            echo "备用链接下载成功"
          fi
          
          sudo unzip -o /tmp/xray.zip -d /usr/local/bin/ xray
          sudo chmod +x /usr/local/bin/xray
          rm -f /tmp/xray.zip
          xray version
          echo "Xray 安装完成"

      - name: 登录失败账号
        if: always() && steps.check_failed.outputs.has_failed == 'true'
        env:
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/Weirdhost/weirdhost_login.py

      # ========== 步骤3: 重新续期 + 发送通知 ==========
      - name: 重新登录失败账号续期（完成闭环）
        id: step3
        if: always()
        env:
          WEIRDHOST_COOKIE_1: ${{ secrets.WEIRDHOST_COOKIE_1 }}
          WEIRDHOST_COOKIE_2: ${{ secrets.WEIRDHOST_COOKIE_2 }}
          WEIRDHOST_COOKIE_3: ${{ secrets.WEIRDHOST_COOKIE_3 }}
          WEIRDHOST_COOKIE_4: ${{ secrets.WEIRDHOST_COOKIE_4 }}
          WEIRDHOST_COOKIE_5: ${{ secrets.WEIRDHOST_COOKIE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RENEW_THRESHOLD_DAYS: "5"
          FREE_RENEW_THRESHOLD_DAYS: "2"
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python scripts/Weirdhost/weirdhost_notify.py

      - name: 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            *.png
            scripts/Weirdhost/*.png
            debug_screenshots/*.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
