name: KataBump 自动续订多账号版

on:
  schedule:
    - cron: '11 4 * * *'
  workflow_dispatch:
    inputs:
      force_renew:
        description: '强制续订'
        required: false
        default: 'false'
        type: boolean

jobs:
  renew:
    name: 执行脚本
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libxtst6 \
            xauth \
            fonts-liberation \
            libgbm1 \
            libxkbcommon0 \
            libvulkan1 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libpango-1.0-0 \
            libcairo2 \
            wget \
            curl

      - name: 安装 WARP 客户端
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg \
            | sudo gpg --yes --dearmor \
              --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] \
            https://pkg.cloudflareclient.com/ jammy main" \
            | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          echo "✅ WARP 客户端安装完成"

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay
          seleniumbase install chromedriver
          seleniumbase install chrome

      - name: 运行续订脚本
        env:
          KATABUMP_ACCOUNTS: ${{ secrets.KATABUMP_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          FORCE_RENEW: ${{ github.event.inputs.force_renew || 'false' }}
          USE_WARP: "true"
          WARP_PROXY_PORT: "40000"
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
          sleep 2
          python scripts/KataBump/main.py

      - name: 上传截图
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7

      - name: 清理旧的工作流运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
