name: IPTV 爬虫

on:
#  schedule:
#    - cron: '0 0 * * *'   # 每天 UTC 0:00 = 北京时间 8:00
#    - cron: '0 9 * * *'   # 每天 UTC 9:00 = 北京时间 17:00
  workflow_dispatch:

jobs:
  scrape:
    name: 执行爬虫
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 解析 TV_ACCOUNTS
        env:
          TV_ACCOUNTS: ${{ secrets.TV_ACCOUNTS }}
        run: |
          PRIVATE_REPO=$(echo "$TV_ACCOUNTS" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('PRIVATE_REPO', ''))")
          PRIVATE_REPO_TOKEN=$(echo "$TV_ACCOUNTS" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('PRIVATE_REPO_TOKEN', ''))")
          echo "PRIVATE_REPO=$PRIVATE_REPO" >> $GITHUB_ENV
          echo "PRIVATE_REPO_TOKEN=$PRIVATE_REPO_TOKEN" >> $GITHUB_ENV

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install seleniumbase requests pyvirtualdisplay pysocks
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          seleniumbase install chromedriver

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，直连 DNS..."

          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup free.freezehost.pro 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 运行爬虫
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          ENABLE_WEBVIEW: "true"
          WEBVIEW_MERGE_MODE: "smart"
          WEBVIEW_SOURCE_URL: "https://raw.githubusercontent.com/yaoxieyoulei/YYKM_assets/main/webview.m3u"
        run: python scripts/TaoIPTV/main.py

      # - name: 上传调试截图
      #   uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: debug-screenshots
      #     path: |
      #       *.png
      #       error.html
      #     retention-days: 3

      - name: 推送到私有仓库
        if: success()
        env:
          PRIVATE_REPO: ${{ env.PRIVATE_REPO }}
          PRIVATE_REPO_TOKEN: ${{ env.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO" ] || [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "未配置私有仓库，跳过"
            exit 0
          fi
          if [ ! -f taoiptv.m3u ]; then
            echo "输出文件不存在"
            exit 1
          fi
          git clone https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${PRIVATE_REPO}.git private-repo
          cp taoiptv.m3u private-repo/
          cd private-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taoiptv.m3u
          git diff --cached --quiet || git commit -m "更新 taoiptv.m3u $(date '+%Y-%m-%d %H:%M')"
          git push

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
