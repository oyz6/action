name: IPTV 爬虫

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00 = 北京时间 8:00
    - cron: '0 9 * * *'   # 每天 UTC 9:00 = 北京时间 17:00
  workflow_dispatch:

jobs:
  IPTV 爬虫:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
      - name: 解析 TV_ACCOUNTS
        env:
          TV_ACCOUNTS: ${{ secrets.TV_ACCOUNTS }}
        run: |
          # 从 JSON 中提取 PRIVATE_REPO 和 PRIVATE_REPO_TOKEN
          PRIVATE_REPO=$(echo "$TV_ACCOUNTS" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('PRIVATE_REPO', ''))")
          PRIVATE_REPO_TOKEN=$(echo "$TV_ACCOUNTS" | python -c "import sys, json; data=json.load(sys.stdin); print(data.get('PRIVATE_REPO_TOKEN', ''))")
          echo "PRIVATE_REPO=$PRIVATE_REPO" >> $GITHUB_ENV
          echo "PRIVATE_REPO_TOKEN=$PRIVATE_REPO_TOKEN" >> $GITHUB_ENV

      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install seleniumbase requests pyvirtualdisplay pysocks
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool
          seleniumbase install chromedriver

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          socks5:
            listen: 127.0.0.1:1080   # 改为 SOCKS5，端口 1080
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3
          # 可选：验证代理是否启动成功
          ss -tlnp | grep 1080

      - name: 运行爬虫
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/TaoIPTV/main.py

#      - name: 上传调试截图
#        uses: actions/upload-artifact@v4
#        if: always()
#        with:
#          name: debug-screenshots
#          path: |
#            *.png
#            error.html
#          retention-days: 3

      - name: 推送到私有仓库
        if: success()
        env:
          PRIVATE_REPO: ${{ env.PRIVATE_REPO }}
          PRIVATE_REPO_TOKEN: ${{ env.PRIVATE_REPO_TOKEN }}
        run: |
          if [ -z "$PRIVATE_REPO" ] || [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "未配置私有仓库，跳过"
            exit 0
          fi
          if [ ! -f taoiptv.m3u ]; then
            echo "输出文件不存在"
            exit 1
          fi
          git clone https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/${PRIVATE_REPO}.git private-repo
          cp taoiptv.m3u private-repo/
          cd private-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add taoiptv.m3u
          git diff --cached --quiet || git commit -m "更新 taoiptv.m3u $(date '+%Y-%m-%d %H:%M')"
          git push
          
      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
