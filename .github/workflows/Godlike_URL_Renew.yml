name: Godlike URL 续期

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定ID（留空运行全部）'
        required: false
        default: ''

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行续期脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: 下载 Buster 扩展
        run: |
          wget -q https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip \
            -O /tmp/buster.zip
          mkdir -p /tmp/buster
          unzip -q /tmp/buster.zip -d /tmp/buster
          echo "BUSTER_PATH=/tmp/buster" >> $GITHUB_ENV

      - name: 配置 Cloudflare WARP 代理
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

          echo "⏳ 等待 WARP 隧道建立（15秒）..."
          sleep 15

          # 验证代理可用性
          echo "测试 WARP 代理..."
          PROXY="http://127.0.0.1:40000"
          if curl -x "$PROXY" -s --max-time 20 https://api.ipify.org; then
            echo "✅ WARP 连接成功，出口 IP: $(curl -x $PROXY -s https://api.ipify.org)"
            echo "PROXY_HTTP=$PROXY" >> $GITHUB_ENV
          else
            echo "❌ WARP 代理启动失败"
            warp-cli status || true
            exit 1
          fi

      - name: 执行续订
        env:
          GODLIKE_ID: ${{ secrets.GODLIKE_ID }}
          GODLIKE_ID_INPUT: ${{ github.event.inputs.accounts }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_HTTP: ${{ env.PROXY_HTTP }}
          BUSTER_PATH: ${{ env.BUSTER_PATH }}
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" python scripts/Godlike/renew.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
