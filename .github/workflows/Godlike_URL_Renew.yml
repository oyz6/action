name: Godlike URL 续期

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定ID（留空运行全部）'
        required: false
        default: ''

permissions:
  actions: write
  contents: read

jobs:
  run-renew:
    name: 执行续期脚本
    runs-on: ubuntu-latest

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage requests SpeechRecognition pydub

      - name: 下载 Buster 扩展
        run: |
          wget -q https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip \
            -O /tmp/buster.zip
          unzip -q /tmp/buster.zip -d /tmp/buster
          echo "BUSTER_PATH=/tmp/buster" >> $GITHUB_ENV

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          if [ -z "$HY2_URL" ]; then
            echo "[INFO] 无代理配置，使用直连模式"
            exit 0
          fi

          echo "[INFO] 配置 Hysteria2 代理"
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria

          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$HY2_URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")

          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:1080
          EOF

          ./hysteria client -c hy2.yaml > hy2.log 2>&1 &
          sleep 5

          echo "[INFO] 测试代理连接..."
          for i in 1 2 3 4 5; do
            PROXY_IP=$(curl -x http://127.0.0.1:1080 -s --max-time 15 https://api.ipify.org 2>/dev/null)
            if [ -n "$PROXY_IP" ]; then
              echo "[INFO] ✅ 代理连接成功，出口 IP: $PROXY_IP"
              echo "PROXY_HTTP=http://127.0.0.1:1080" >> $GITHUB_ENV
              exit 0
            fi
            echo "[WARN] 尝试 $i/5，等待..."
            sleep 3
          done

          echo "[ERROR] ❌ 代理连接失败"
          cat hy2.log
          exit 1

      - name: 执行续订
        env:
          GODLIKE_ID: ${{ secrets.GODLIKE_ID }}
          GODLIKE_ID_INPUT: ${{ github.event.inputs.accounts }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_HTTP: ${{ env.PROXY_HTTP }}
          BUSTER_PATH: ${{ env.BUSTER_PATH }}
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" python scripts/Godlike/renew.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
