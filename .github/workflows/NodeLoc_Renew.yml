# NL_ACCOUNT 账号配置格式
# 用户名----密码
# 多账号配置（每行一个）
# user1----password1
# user2----password2
# user3----password3

name: NodeLoc 每日签到

on:
  schedule:
    - cron: '05 4 * * *'  # 每天北京时间 12:05 运行
  workflow_dispatch:
    inputs:
      debug:
        description: '调试模式'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  CHROME_VERSION: '131'

jobs:
  checkin:
    name: 执行签到
    runs-on: ubuntu-latest
    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: nodeloc/requirements.txt   # 指向 nodeloc 目录下的依赖文件

      - name: 安装 Chrome 浏览器
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: ${{ env.CHROME_VERSION }}
          install-chromedriver: false  # 我们使用 undetected-chromedriver，无需官方 chromedriver

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install -r nodeloc/requirements.txt           # 从正确路径安装

      - name: 创建截图目录
        run: mkdir -p /tmp/screenshots

      - name: 执行签到脚本
        env:
          NL_ACCOUNT: ${{ secrets.NL_ACCOUNT }}
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DEBUG: ${{ github.event.inputs.debug == 'true' && '1' || '0' }}
        run: |
          if [ "$DEBUG" == "1" ]; then
            echo "🔍 调试模式开启"
            python -c "import undetected_chromedriver as uc; print('undetected_chromedriver 版本:', uc.__version__)"
          fi
          python nodeloc/main.py

#      - name: 上传调试截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: debug-screenshots
#          path: /tmp/screenshots/
#          retention-days: 3
#          if-no-files-found: ignore

      - name: 清理工作流记录（保留最近3次）
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
