name: Rustix 保活

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部）'
        required: false
        default: ''

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 安装 Playwright 及依赖
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: 配置代理
        env:
          NODE_LINK: ${{ secrets.PROXY_NODE }}
        run: |
          chmod +x scripts/setup_proxy.sh
          bash scripts/setup_proxy.sh

      - name: 执行保活任务
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TARGET_ACCOUNTS: ${{ github.event.inputs.accounts }}
          PROXY_SERVER: socks5://127.0.0.1:1080   # 由 setup_proxy.sh 输出
        run: python scripts/Rustix/Rustix.py

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
