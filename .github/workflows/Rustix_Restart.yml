name: Rustix 自动重启
on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS 并验证网络
        run: |
          echo "[INFO] 配置 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sleep 2
          
          echo "[INFO] 验证 WARP 状态..."
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp='
          
          echo "[INFO] 验证目标站点连通性..."
          curl -sI --max-time 10 https://my.rustix.me | head -3

      - name: 安装依赖
        run: |
          pip install -q seleniumbase pyvirtualdisplay requests

      - name: 执行重启脚本
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          INPUT_ACCOUNTS: ${{ github.event.inputs.accounts || '' }}
        run: |
          python scripts/Rustix/rustix_restart.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
