name: Rustix 自动重启
on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      RUSTIX_1: ${{ secrets.RUSTIX_1 }}
      RUSTIX_2: ${{ secrets.RUSTIX_2 }}
      RUSTIX_3: ${{ secrets.RUSTIX_3 }}
      RUSTIX_4: ${{ secrets.RUSTIX_4 }}
      RUSTIX_5: ${{ secrets.RUSTIX_5 }}
      INPUT_ACCOUNTS: ${{ github.event.inputs.accounts || '' }}

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 配置 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup my.rustix.me 1.1.1.1 || echo "[WARN] DNS 解析失败"
          echo ""
          echo "[INFO] 当前 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP 状态:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 安装依赖
        run: |
          echo "[INFO] 安装 Python 依赖..."
          pip install seleniumbase requests
          echo "[INFO] 安装浏览器驱动..."
          seleniumbase install chromedriver
          echo "[INFO] 依赖安装完成"

      - name: 执行重启脚本
        run: |
          echo "[INFO] 开始执行 Rustix Auto Restart..."
          python scripts/Rustix/rustix_restart.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: Rustix Auto Restart
          retain_days: 0
          keep_minimum_runs: 2
