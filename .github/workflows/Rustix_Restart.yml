name: Rustix 自动重启
on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -q seleniumbase pyvirtualdisplay requests

      - name: 配置 Hysteria2 代理
        env:
          HY2_URL: ${{ secrets.HY2_URL }}
        run: |
          echo "[INFO] 下载 Hysteria2..."
          wget -q https://github.com/apernet/hysteria/releases/download/app%2Fv2.6.1/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF
          
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 3
          
          echo "[INFO] 验证代理..."
          curl -sI --proxy http://127.0.0.1:7890 --max-time 10 https://my.rustix.me | head -3

      - name: 执行重启脚本
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          INPUT_ACCOUNTS: ${{ github.event.inputs.accounts || '' }}
          PROXY_SERVER: http://127.0.0.1:7890
        run: python scripts/Rustix/rustix_restart.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
