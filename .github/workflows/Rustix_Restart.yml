name: Rustix 自动重启

on:
  workflow_dispatch:

jobs:
  rustix_task:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -q seleniumbase
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL_PL }}
        run: |
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:7890
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 5
          curl -x http://127.0.0.1:1080 -s https://api.ip.sb/ip || echo "⚠️ 代理测试失败"

      - name: 执行 Rustix 任务 (多账号)
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: http://127.0.0.1:1080
        run: |
          xvfb-run -a python scripts/Rustix/Rustix.py
          echo "✅ 执行完成"

      - name: 上传截图和日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustix-debug-${{ github.run_number }}
          path: output/
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
