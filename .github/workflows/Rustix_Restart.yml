name: Rustix 重启

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  rustix_task:
    name: 执行任务
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -q seleniumbase
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: 配置代理
        env:
          HY2_URL: ${{ secrets.HY2_URL_PL }}  # 注意这里我改为HY2_URL_PL了
        run: |
          wget -q https://github.com/oyz6/action/releases/download/proxy/hysteria-linux-amd64 -O hysteria
          chmod +x hysteria
          URL="${HY2_URL#hysteria2://}"
          PASSWORD="${URL%%@*}"
          SERVER="${URL#*@}"; SERVER="${SERVER%%\?*}"
          SNI=$(echo "$URL" | grep -oP 'sni=\K[^&]+' || echo "${SERVER%%:*}")
          cat > hy2.yaml << EOF
          server: ${SERVER}
          auth: ${PASSWORD}
          tls:
            sni: ${SNI}
            insecure: true
          http:
            listen: 127.0.0.1:1080
          EOF
          ./hysteria client -c hy2.yaml > /dev/null 2>&1 &
          sleep 5
          
          # 测试 Rustix 登录页面
          echo "🔍 测试代理连接 Rustix..."
          HTTP_CODE=$(curl -x http://127.0.0.1:1080 -s -o /dev/null -w "%{http_code}" --max-time 10 https://my.rustix.me/auth/login)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ 代理测试成功 (HTTP $HTTP_CODE)"
          else
            echo "⚠️ 代理测试失败 (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: 执行任务
        env:
          RUSTIX: ${{ secrets.RUSTIX }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: http://127.0.0.1:1080
          TARGET_ACCOUNTS: ${{ github.event.inputs.accounts }}
        run: |
          xvfb-run -a python scripts/Rustix/Rustix.py
          echo "✅ 执行完成"

#      - name: 上传截图和日志
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: rustix-debug-${{ github.run_number }}
#          path: output/
#          retention-days: 3
#          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
