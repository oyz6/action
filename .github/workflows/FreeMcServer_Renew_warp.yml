name: FreeMcServer-warp 续期

on:
  schedule:
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg dnsmasq
          pip install -q seleniumbase requests pyvirtualdisplay

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 DNS 并验证 WARP
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          sudo tee /etc/resolv.conf > /dev/null << 'EOF'
          nameserver 1.1.1.1
          nameserver 8.8.8.8
          options timeout:2 attempts:3
          EOF
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 3

          for i in {1..30}; do
            warp_status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+')
            if [[ "$warp_status" == "on" || "$warp_status" == "plus" ]]; then
              echo "✅ WARP 已连接"
              break
            fi
            echo "⏳ 等待 WARP ($i/30)"
            sleep 2
          done

      - name: 执行续订脚本
        env:
          FREEMCSERVER: ${{ secrets.FREEMCSERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/FreeMcServer/warp.py

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: screenshots-${{ github.run_number }}
#          path: output/screenshots/*.png
#          retention-days: 7
#          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
