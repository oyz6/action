name: FreeMcServer-warp 续期

on:
  schedule:
    # 每 2 小时 30 分运行一次
    - cron: '30 */2 * * *'
  workflow_dispatch:

jobs:
  renew:
    name: 执行续订
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg dnsmasq
          pip install -q seleniumbase requests pyvirtualdisplay

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "🔧 配置 DNS..."
          
          # 停掉 systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          
          # 删掉软链接，写真实文件
          sudo rm -f /etc/resolv.conf
          
          # 写多个 DNS 服务器
          cat > /tmp/resolv.conf << 'EOF'
          nameserver 1.1.1.1
          nameserver 8.8.8.8
          nameserver 1.0.0.1
          nameserver 8.8.4.4
          options timeout:2 attempts:3
          EOF
          sudo tee /etc/resolv.conf < /tmp/resolv.conf > /dev/null
          
          # 防止被覆盖
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          
          # 等 DNS 生效
          sleep 3
          
          echo "🔍 DNS 测试:"
          echo "--- freemcserver.net ---"
          dig freemcserver.net +short @1.1.1.1 || echo "⚠️ 解析失败"
          echo "--- panel.freemcserver.net ---"
          dig panel.freemcserver.net +short @1.1.1.1 || echo "⚠️ 解析失败"
          
          echo ""
          echo "🌍 当前 IP 和 WARP 状态:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo ""
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || echo "⚠️ 无法获取 WARP 状态"
          
          echo ""
          echo "📄 /etc/resolv.conf:"
          cat /etc/resolv.conf

      - name: 验证 WARP 连接
        run: |
          echo "⏳ 等待 WARP 完全连接..."
          max_attempts=30
          attempt=0
          
          while [ $attempt -lt $max_attempts ]; do
            warp_status=$(curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo "unknown")
            
            if [ "$warp_status" = "on" ] || [ "$warp_status" = "plus" ]; then
              echo "✅ WARP 已连接: $warp_status"
              curl -s --max-time 5 https://www.cloudflare.com/cdn-cgi/trace
              break
            fi
            
            echo "⏳ WARP 连接中... ($((attempt+1))/$max_attempts) - 状态: $warp_status"
            sleep 2
            ((attempt++))
          done
          
          if [ $attempt -eq $max_attempts ]; then
            echo "⚠️ WARP 未能完全连接，但继续执行脚本"
          fi

      - name: 测试网站连接
        run: |
          echo "🌐 测试 FreeMcServer 连接..."
          
          for i in {1..3}; do
            echo ""
            echo "尝试 $i/3:"
            if curl -s --max-time 15 -I https://panel.freemcserver.net | head -n 1; then
              echo "✅ 连接成功"
              break
            else
              echo "❌ 连接失败，等待后重试..."
              sleep 5
            fi
          done

      - name: 执行续订脚本
        env:
          FREEMCSERVER: ${{ secrets.FREEMCSERVER }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "[INFO] 开始执行 FreeMcServer 续订脚本"
          echo "[INFO] 当前网络状态:"
          curl -s https://www.cloudflare.com/cdn-cgi/trace | head -n 5
          
          python scripts/FreeMcServer/warp.py

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
