name: TeoHeberg 多账号续期

on:
  workflow_dispatch:
  schedule:
    - cron: '33 0 * * *'  # 北京时间 08:33

jobs:
  renew:
    name: 执行多账号续期
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 检出私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: scripts

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖与 Python 包
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb p7zip-full ffmpeg \
            mesa-utils libgl1-mesa-glx libgl1-mesa-dri \
            curl gnupg lsb-release

          pip install --quiet playwright requests SpeechRecognition pydub
          python -m playwright install --with-deps chromium

          # 准备 Turnstile 插件
          EXT_DIR="scripts/TeoHeberg/extensions/turnstile-bypasser/unpacked"
          mkdir -p "$EXT_DIR"
          curl -fsSL "https://github.com/oyz6/action/releases/download/Verification/turnstile.crx" -o turnstile.crx
          7z x -y turnstile.crx -o"$EXT_DIR" >/dev/null
          test -f "$EXT_DIR/manifest.json"

      - name: 配置系统 DNS（为 WARP 准备）
        run: |
          # 停止 systemd-resolved 避免端口冲突
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          # 移除旧 resolv.conf 并写入 Cloudflare DNS（WARP 会通过代理转发，不影响最终出口）
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf

          # 可选锁定防止被覆盖（但 WARP 代理模式不依赖系统 DNS，锁定无妨）
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true

          # 验证 DNS 可用
          dig +short google.com || nslookup google.com || echo "DNS 解析正常"

      - name: 安装 Cloudflare WARP 客户端
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloudflare-warp

      - name: 启动 WARP（代理模式，支持 IP 切换）
        run: |
          set -euo pipefail

          # 首次注册
          warp-cli register || true

          # 设置为代理模式（这样切换 IP 不影响系统路由）
          warp-cli set-mode proxy
          warp-cli set-proxy-port 40000

          # 可选：禁用 IPv6 避免部分网络问题
          warp-cli disable-ipv6 || true

          # 连接 WARP
          warp-cli connect

          # 等待连接成功
          for i in {1..30}; do
            # 通过代理检测 warp 状态
            status=$(curl -s --max-time 5 --proxy socks5h://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | grep -oP 'warp=\K\w+' || echo unknown)
            if [[ "$status" =~ ^(on|plus)$ ]]; then
              echo "✅ WARP 代理已就绪"
              break
            fi
            echo "⏳ 等待 WARP 代理 ($i/30)..."
            sleep 2
          done

          # 显示当前出口 IP（经代理）
          echo -n "🌐 当前 WARP 出口 IP: "
          curl -s --proxy socks5h://127.0.0.1:40000 https://api.ipify.org
          echo

      - name: 执行多账号续期脚本
        env:
          TEOHEBERG: ${{ secrets.TEOHEBERG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          # 传递给脚本的代理地址（供 Playwright 和 requests 使用）
          HTTP_PROXY: socks5h://127.0.0.1:40000
          HTTPS_PROXY: socks5h://127.0.0.1:40000
          ALL_PROXY: socks5h://127.0.0.1:40000
        run: |
          cd scripts
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python TeoHeberg/main2.py

      - name: 清理工作流历史记录（可选）
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 3
