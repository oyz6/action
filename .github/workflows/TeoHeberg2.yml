name: TeoHeberg 多账号续期

on:
  workflow_dispatch:
  schedule:
    - cron: '33 0 * * *'  # 北京时间 08:33

jobs:
  renew:
    name: 执行多账号续期
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 检出私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖与 Python 包
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq -o Dpkg::Use-Pty=0 \
            xvfb p7zip-full ffmpeg \
            mesa-utils libgl1-mesa-glx libgl1-mesa-dri \
            curl gnupg lsb-release dnsutils

          pip install --quiet playwright requests SpeechRecognition pydub
          python -m playwright install --with-deps chromium

          # 准备 Turnstile 插件
          EXT_DIR="scripts/TeoHeberg/extensions/turnstile-bypasser/unpacked"
          mkdir -p "$EXT_DIR"
          curl -fsSL "https://github.com/oyz6/action/releases/download/Verification/turnstile.crx" -o turnstile.crx
          7z x -y turnstile.crx -o"$EXT_DIR" >/dev/null
          test -f "$EXT_DIR/manifest.json"

      - name: 安装 Cloudflare WARP 客户端
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloudflare-warp

      - name: 配置 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf

      - name: 启动 WARP 守护进程并配置代理
        run: |
          set -euo pipefail

          # 启动 warp-svc 服务
          sudo systemctl start warp-svc
          sudo systemctl enable warp-svc

          # 接受服务条款（创建 .lic 文件）
          mkdir -p ~/.local/share/warp
          echo "tos=accepted" > ~/.local/share/warp/.lic

          # 首次注册（如果已注册会报错，忽略）
          warp-cli registration new || true

          # 设置为代理模式
          warp-cli mode proxy

          # 设置 SOCKS5 代理端口
          warp-cli proxy port 40000

          # 禁用 IPv6（可选，提高兼容性）
          warp-cli disable-ipv6 || true

          # 连接 WARP
          warp-cli connect

          # 等待代理就绪
          for i in {1..30}; do
            if curl -s --max-time 5 --proxy socks5h://127.0.0.1:40000 https://www.cloudflare.com/cdn-cgi/trace | grep -qP 'warp=(on|plus)'; then
              echo "✅ WARP 代理就绪"
              break
            fi
            echo "⏳ 等待 WARP 代理 ($i/30)..."
            sleep 2
          done

          echo -n "🌐 当前 WARP 出口 IP: "
          curl -s --proxy socks5h://127.0.0.1:40000 https://api.ipify.org
          echo

      - name: 执行多账号续期脚本
        env:
          TEOHEBERG: ${{ secrets.TEOHEBERG }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: :99
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          HTTP_PROXY: socks5h://127.0.0.1:40000
          HTTPS_PROXY: socks5h://127.0.0.1:40000
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset +extension GLX +render" \
            python scripts/TeoHeberg/main.py

      - name: 清理工作流历史记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 5
