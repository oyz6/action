name: 预打包 node_modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 安装依赖（在项目子目录中）
        working-directory: ./scripts/mcbot
        run: npm install --omit=dev --no-audit --no-fund

      - name: 打包项目
        working-directory: ./scripts/mcbot
        run: tar -czf ../../app-bundle.tar.gz .

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-${{ github.run_id }}
          path: app-bundle.tar.gz
          retention-days: 7
