name: 预打包 node_modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 生成 package.json（如仓库中不存在）
        run: |
          cat > package.json << 'JSONEOF'
          {
            "name": "pathfinder-pro-2025-taskcenter",
            "version": "3.0.0",
            "description": "Pathfinder PRO 2025 旗舰版 - 网页可视化续期 + 游戏挂机双引擎 + 应用中心",
            "main": "index.js",
            "scripts": {
              "start": "node index.js"
            },
            "dependencies": {
              "mineflayer": "latest",
              "mineflayer-pathfinder": "latest",
              "minecraft-data": "latest",
              "express": "^4.21.2",
              "axios": "^1.7.9",
              "multer": "^1.4.5-lts.1",
              "form-data": "^4.0.1"
            },
            "engines": {
              "node": ">=18.0.0"
            },
            "author": "Pathfinder-Team",
            "license": "MIT"
          }
          JSONEOF

      - name: 安装依赖
        run: npm install --omit=dev --no-audit --no-fund

      - name: 清理缓存并打包
        run: |
          rm -rf node_modules/.cache   # 清理可能动态变化的缓存
          tar -czf app-bundle.tar.gz \
            --exclude='.git' \
            --exclude='node_modules/.cache' \
            --exclude='.github' \
            --warning=no-file-changed \
            .

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-${{ github.run_id }}
          path: app-bundle.tar.gz
          retention-days: 7
