name: 预打包 node_modules

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]   # 使用 20 更稳定，避免 18 即将停止维护

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # 移除 cache 配置，因为没有 lock 文件

      - name: 安装依赖
        run: |
          npm install --omit=dev --no-audit --no-fund

      - name: 打包整个项目
        run: |
          tar -czf app-bundle.tar.gz \
            --exclude='.git' \
            --exclude='node_modules/.cache' \
            --exclude='.github' \
            .

      - name: 上传制品
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-${{ github.run_id }}
          path: app-bundle.tar.gz
          retention-days: 7
