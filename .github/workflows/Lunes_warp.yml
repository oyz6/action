name: Lunes Host 重启 warp版

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          pip install -q seleniumbase pyvirtualdisplay requests SpeechRecognition pydub PyNaCl

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "🔧 停用 systemd-resolved，直连 DNS..."
          
          # 停掉 systemd-resolved
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          
          # 删掉软链接，写真实文件
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          
          # 防止被覆盖
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          
          # 等 DNS 生效
          sleep 2
          
          echo "🔍 DNS 测试:"
          echo "--- ctrl.lunes.host ---"
          nslookup ctrl.lunes.host 1.1.1.1 || dig ctrl.lunes.host @1.1.1.1 +short || echo "⚠️ 解析失败"
          echo "--- api.github.com ---"
          nslookup api.github.com 1.1.1.1 || echo "⚠️ 解析失败"
          echo "--- 系统级测试 ---"
          getent hosts ctrl.lunes.host || echo "⚠️ getent 失败"
          
          echo ""
          echo "🌍 当前 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "🔍 WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='
          
          echo ""
          echo "📄 /etc/resolv.conf:"
          cat /etc/resolv.conf

      - name: 执行任务
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          python scripts/Lunes/Lunes-warp.py
          echo "完成"

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
