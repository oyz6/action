name: Lunes Host 自动重启 (WARP 增强版)

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统与 Python 依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          pip install -q seleniumbase speechrecognition pydub pyvirtualdisplay requests PyNaCl

      - name: 启用 Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 配置 WARP 代理环境变量
        run: |
          # WARP client 默认 SOCKS5 端口为 40000
          echo "ALL_PROXY=socks5://127.0.0.1:40000" >> $GITHUB_ENV
          echo "HTTP_PROXY=socks5://127.0.0.1:40000" >> $GITHUB_ENV
          echo "HTTPS_PROXY=socks5://127.0.0.1:40000" >> $GITHUB_ENV
          echo "no_proxy=localhost,127.0.0.1,::1" >> $GITHUB_ENV

      - name: 修复 DNS（防止解析污染）
        run: |
          echo "🔧 停用 systemd-resolved，使用 Cloudflare DNS"
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 1.0.0.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2
          # 验证 DNS
          echo "🔍 DNS 测试:"
          nslookup ctrl.lunes.host 1.1.1.1 || dig ctrl.lunes.host @1.1.1.1 +short
          nslookup api.github.com 1.1.1.1 || true
          curl -s --max-time 10 https://api.ipify.org && echo
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 运行 Lunes Host 自动重启
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          python scripts/Lunes/Lunes-warp.py
          echo "✅ 脚本执行完毕"

      - name: 上传截图（无论成功失败）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理旧运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
