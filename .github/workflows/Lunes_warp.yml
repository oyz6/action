name: Lunes Host 重启 warp

on:
  schedule:
    - cron: '35 3 * * *'   # 北京时间 11:35
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定账号（留空则运行所有）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb \
            ffmpeg \
            sox \
            libsox-fmt-all \
            portaudio19-dev \
            flac \
            libasound2-dev
          
          pip install --quiet --upgrade pip
          pip install --quiet \
            seleniumbase \
            pyvirtualdisplay \
            playwright \
            requests \
            PyNaCl \
            SpeechRecognition \
            pydub
          
          python -m playwright install --with-deps chromium

      - name: 启用 WARP 代理
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

      - name: 执行自动重启
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          # ... 其余 LUNES_*
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          DISPLAY: :99
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset" \
            python -u scripts/Lunes/Lunes-warp.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 上传调试音频
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audio-debug-${{ github.run_number }}
          path: output/audio_debug/*.mp3
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
