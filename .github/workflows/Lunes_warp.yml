name: Lunes Host 重启 (Buster 扩展)

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定账号（留空则运行所有）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    permissions:
      actions: write

    steps:
      - name: 拉取脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb ffmpeg libgl1-mesa-glx libgl1-mesa-dri p7zip-full
          pip install --quiet playwright requests PyNaCl
          python -m playwright install --with-deps chromium

      - name: 下载并解压 Buster 扩展
        run: |
          mkdir -p extensions/buster
          wget -q -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked > /dev/null
          echo "✅ Buster 扩展已就绪"
          ls extensions/buster/unpacked

      - name: 启用 WARP 代理
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

      - name: 执行自动重启
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          LUNES_6: ${{ secrets.LUNES_6 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          DISPLAY: :99
        run: |
          xvfb-run --auto-servernum \
            --server-args="-screen 0 1920x1080x24 -ac -noreset" \
            python scripts/Lunes/Lunes-warp.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
