name: Lunes Host 自动重启 (WARP 增强版 v2)

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -q seleniumbase speechrecognition pydub requests PyNaCl

      - name: 启用 WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 验证 WARP 代理可用性
        run: |
          # 等待 WARP 完全启动
          sleep 10
          # 测试代理端口（WARP client 默认 SOCKS5 40000）
          echo "测试 WARP SOCKS5 代理 ..."
          curl -x socks5h://127.0.0.1:40000 -s --max-time 10 https://api.ipify.org || echo "代理测试失败"
          # 将所有流量通过 WARP 代理
          echo "ALL_PROXY=socks5h://127.0.0.1:40000" >> $GITHUB_ENV
          echo "HTTP_PROXY=socks5h://127.0.0.1:40000" >> $GITHUB_ENV
          echo "HTTPS_PROXY=socks5h://127.0.0.1:40000" >> $GITHUB_ENV
          echo "REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          nslookup ctrl.lunes.host 1.1.1.1

      - name: 执行重启任务
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: python scripts/Lunes/Lunes-warp.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunes-screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
