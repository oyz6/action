name: Lunes Host 重启 (WARP+NopeCHA)

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定账号（留空则运行所有）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: 拉取脚本仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install -q seleniumbase requests PyNaCl

      - name: 安装并配置 NopeCHA 扩展
        working-directory: scripts
        run: |
          mkdir -p extensions/nopecha/unpacked
          wget -q -O /tmp/nopecha.zip \
            https://github.com/NopeCHALLC/nopecha-extension/releases/latest/download/chromium.zip
          7z x -y /tmp/nopecha.zip -oextensions/nopecha/unpacked > /dev/null
          rm /tmp/nopecha.zip
          python3 -c "import json; m=json.load(open('extensions/nopecha/unpacked/manifest.json')); print(f'✅ NopeCHA {m[\"version\"]} 就绪')"

      - name: 启用 WARP 代理
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS（确保 WARP 生效）
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

      - name: 执行自动重启
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          LUNES_6: ${{ secrets.LUNES_6 }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          python scripts/Lunes/Lunes-warp.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 保留最近2条运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
