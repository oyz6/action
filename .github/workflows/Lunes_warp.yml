name: Lunes Host 重启 warp版

on:
  workflow_dispatch:
    inputs:
      accounts:
        description: '指定邮箱账号（留空运行全部，多个用逗号分隔）'
        required: false
        default: ''

jobs:
  restart:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: oyz6/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg > /dev/null 2>&1
          pip install -q seleniumbase pyvirtualdisplay requests SpeechRecognition pydub PyNaCl

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS 并验证
        run: |
          echo "🔧 修复 DNS..."
          
          # 备份并写入可靠 DNS
          sudo cp /etc/resolv.conf /etc/resolv.conf.bak || true
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf
          
          # 如果 systemd-resolved 在管，也写一份
          if [ -d /run/systemd/resolve ]; then
            echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /run/systemd/resolve/resolv.conf || true
            sudo systemctl restart systemd-resolved 2>/dev/null || true
          fi
          
          # 验证 DNS
          echo "🔍 DNS 解析测试:"
          nslookup ctrl.lunes.host || echo "⚠️ nslookup 失败"
          nslookup api.github.com || echo "⚠️ nslookup 失败"
          
          echo ""
          echo "🌍 当前 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          
          echo "🔍 Cloudflare Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc='

      - name: 执行任务
        env:
          LUNES_ACCOUNTS: ${{ github.event.inputs.accounts }}
          LUNES_1: ${{ secrets.LUNES_1 }}
          LUNES_2: ${{ secrets.LUNES_2 }}
          LUNES_3: ${{ secrets.LUNES_3 }}
          LUNES_4: ${{ secrets.LUNES_4 }}
          LUNES_5: ${{ secrets.LUNES_5 }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          python scripts/Lunes/Lunes-warp.py
          echo "完成"

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: output/screenshots/*.png
          retention-days: 5
          if-no-files-found: ignore

      - name: 清理运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
