name: VPS8 签到

on:
  schedule:
    - cron: '35 3 * * *'   # 北京时间 11:35
  workflow_dispatch:

jobs:
  sign:
    name: 执行签到
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg google-chrome-stable fonts-noto-cjk fonts-wqy-zenhei fonts-wqy-microhei
          pip install -q DrissionPage SpeechRecognition pydub requests

      - name: 配置 WARP 代理
        run: |
          # 安装 Cloudflare WARP 客户端
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ jammy main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y cloudflare-warp
          
          # 注册并启动为代理模式 (HTTP 代理端口 40000)
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect

          echo "⏳ 等待 WARP 隧道建立（15秒）..."
          sleep 15

          # 验证代理可用性，并将代理地址写入环境文件
          PROXY="http://127.0.0.1:40000"
          if curl -x "$PROXY" -s --max-time 20 https://api.ipify.org; then
            echo "✅ WARP 连接成功，出口 IP: $(curl -x $PROXY -s https://api.ipify.org)"
            echo "PROXY_HTTP=$PROXY" >> $GITHUB_ENV
          else
            echo "❌ WARP 代理启动失败"
            warp-cli status || true
            exit 1
          fi

      - name: 执行 VPS8 签到
        env:
          VPS8: ${{ secrets.VPS8 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run -a --server-args="-screen 0 1280x720x24" python -u scripts/VPS8/main-re.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/*.png
          retention-days: 3
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
