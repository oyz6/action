name: F2 VPS8 签到

on:
  workflow_dispatch:

jobs:
  sign:
    name: 执行签到
    runs-on: ubuntu-22.04
    timeout-minutes: 30  # 给 Buster 300s 足够空间
    permissions:
      contents: read
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb fonts-noto-cjk fonts-wqy-zenhei p7zip-full

      - name: 安装 Playwright 及 Python 库
        run: |
          pip install -q playwright 'requests[socks]' pynacl
          playwright install chromium

      - name: 下载并解压扩展
        run: |
          mkdir -p scripts/extensions/nopecha scripts/extensions/buster

          wget -q -O scripts/extensions/nopecha/chromium.zip \
            https://github.com/NopeCHALLC/nopecha-extension/releases/download/0.6.0/chromium.zip
          7z x -y scripts/extensions/nopecha/chromium.zip -oscripts/extensions/nopecha/unpacked

          wget -q -O scripts/extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          7z x -y scripts/extensions/buster/buster.zip -oscripts/extensions/buster/unpacked

      - name: 设置代理 (sing-box)
        env:
          NODE_LINK: ${{ secrets.HY2_URL_FR }}  # 改为对应节点变量名
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "❌ 代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ VPS8 签到失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 执行 VPS8 签到
        env:
          VPS8_RENEW_TEST: "0"
          VPS8: ${{ secrets.VPS82 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          NOPECHA_KEY: ${{ secrets.NOPECHA_KEY }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}   # 由 setup_proxy.sh 写入格式:socks5://127.0.0.1:1080
          GH_TOKEN: ${{ github.token }}   # 自动更新 Cookie
          GITHUB_REPOSITORY: ${{ github.repository }}   # 自动更新 Cookie
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" python -u scripts/VPS8/main_NopeCHA.py

#      - name: 上传截图
#        if: always()
#        uses: actions/upload-artifact@v4
#        with:
#          name: screenshots-${{ github.run_number }}
#          path: screenshots/*.png
#          retention-days: 3
#          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
