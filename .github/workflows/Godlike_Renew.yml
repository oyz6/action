name: Godlike 续期
on:
  schedule:
    - cron: '0 */3 * * *'
    - cron: '30 1-23/3 * * *'
  workflow_dispatch:

jobs:
  add_time_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取脚本仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests playwright
          playwright install --with-deps chromium

      # 如果需要代理，保留此步骤（需在仓库 secrets 中配置 PROXY_NODE）
      - name: 启动代理（可选）
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -n "$PROXY_NODE" ]; then
            # 此处粘贴你的 Xray 安装和配置脚本（参考原工作流）
            echo "PROXY_SERVER=socks5://127.0.0.1:1080" >> $GITHUB_ENV
          fi

      - name: 运行续期脚本
        env:
          GODLIKE_1: ${{ secrets.GODLIKE_1 }}
          GODLIKE_2: ${{ secrets.GODLIKE_2 }}
          GODLIKE_3: ${{ secrets.GODLIKE_3 }}
          GODLIKE_4: ${{ secrets.GODLIKE_4 }}
          GODLIKE_5: ${{ secrets.GODLIKE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}
        run: python scripts/Godlike/main.py
