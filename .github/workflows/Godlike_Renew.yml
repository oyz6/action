name: Godlike 续期
on:
  schedule:
    - cron: '25 3 * * *'  # 每天北京时间 11:25 运行
  workflow_dispatch:

jobs:
  add_time_job:
    name: 运行续期脚本
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 拉取私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}
          path: .

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests playwright pynacl websockets
          playwright install --with-deps chromium

      - name: 设置代理
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          chmod +x scripts/setup_proxy.sh
          if ! bash scripts/setup_proxy.sh; then
            echo "❌ 代理设置失败，发送通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="❌ Godlike 续期失败：代理不可用" \
              --max-time 10 || true
            exit 1
          fi

      - name: 运行续期脚本
        env:
          GODLIKE_1: ${{ secrets.GODLIKE_1 }}
#         GODLIKE_2: ${{ secrets.GODLIKE_2 }}
#          GODLIKE_3: ${{ secrets.GODLIKE_3 }}
#          GODLIKE_4: ${{ secrets.GODLIKE_4 }}
#          GODLIKE_5: ${{ secrets.GODLIKE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN_8 }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
          PROXY_SERVER: ${{ env.PROXY_SERVER }}    # 由 setup_proxy.sh 写入格式:socks5://127.0.0.1:1080
        run: python scripts/Godlike/main.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: scripts/Godlike/*.png

      - name: 清理历史
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
