name: Wispbyte 自动重启

on:
#  schedule:
#    - cron: '0 0,6,12,18 * * *'    # 每天 UTC 0点/6点/12点/18点 (北京时间 8/14/20/2)
  workflow_dispatch:               # 手动触发

permissions:
  actions: write
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/scripts
          token: ${{ secrets.REPO_TOKEN }}

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip curl gnupg
          wget -q -O /tmp/google-chrome-stable_current_amd64.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests

      - name: 启用 WARP 网络（隔离 IP）
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 执行重启脚本
        env:
          WISPBYTE_1: ${{ secrets.WISPBYTE_1 }}
          WISPBYTE_2: ${{ secrets.WISPBYTE_2 }}
          WISPBYTE_3: ${{ secrets.WISPBYTE_3 }}
          WISPBYTE_4: ${{ secrets.WISPBYTE_4 }}
          WISPBYTE_5: ${{ secrets.WISPBYTE_5 }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python scripts/Wispbyte/Wispbyte_Restart.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wispbyte-screenshots-${{ github.run_number }}
          path: output/screenshots/*.png
          retention-days: 7
          if-no-files-found: ignore

      - name: 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
